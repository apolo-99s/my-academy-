<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060608;color:#E5E7EB;font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
button{cursor:pointer;font-family:inherit}
input{font-family:inherit}
#landing,#academy,#skill-view,#lesson-view{display:none;flex-direction:column;min-height:100vh}
nav{padding:16px 24px;border-bottom:1px solid #111118;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;background:#060608;position:sticky;top:0;z-index:100}
.brand{font-weight:800;font-size:16px;color:#fff}
.brand span{color:#7C3AED}
.lang-btns{display:flex;gap:6px}
.lang-btn{background:transparent;border:1px solid #1C1C28;color:#6B7280;border-radius:8px;padding:5px 12px;font-size:13px;font-weight:400;transition:all 0.15s}
.lang-btn.active{background:#7C3AED;border-color:#7C3AED;color:#fff;font-weight:700}
.hero{background:linear-gradient(180deg,#0D0818 0%,#060608 100%);padding:52px 20px 44px;text-align:center;border-bottom:1px solid #1C1C28}
.hero-badge{display:inline-block;background:#0D0818;border:1px solid #7C3AED44;border-radius:6px;padding:5px 14px;margin-bottom:18px;font-size:11px;color:#A78BFA;letter-spacing:3px;text-transform:uppercase}
.hero h1{font-size:clamp(26px,6vw,52px);font-weight:900;margin:0 0 14px;background:linear-gradient(135deg,#fff 30%,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:pre-line}
.hero p{color:#6B7280;font-size:16px;max-width:520px;margin:0 auto 32px;line-height:1.65}
.features{display:flex;justify-content:center;flex-wrap:wrap;gap:12px;font-size:13px;color:#4B5563}
.feature-tag{background:#0F0F18;border:1px solid #1C1C28;border-radius:20px;padding:6px 14px}
.skill-cards{max-width:860px;margin:44px auto;padding:0 20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.skill-card{border-radius:16px;padding:26px;cursor:pointer;transition:all 0.2s;border:2px solid transparent}
.skill-card:hover{transform:translateY(-3px)}
.skill-icon{font-size:44px;margin-bottom:14px}
.skill-sub{font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.skill-title{font-size:22px;font-weight:800;color:#fff;margin:0 0 8px}
.skill-tagline{color:#6B7280;font-size:13px;line-height:1.5;margin:0 0 18px}
.skill-stats{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;border-top:1px solid #ffffff10;padding-top:14px}
.skill-stat{display:flex;justify-content:space-between;font-size:12px}
.stat-label{color:#4B5563}
.skill-cta{border-radius:8px;padding:10px;text-align:center;font-weight:700;font-size:14px;color:#fff;border:none;width:100%}
.recommendation{max-width:860px;margin:0 auto 32px;padding:0 20px}
.rec-box{background:#0D0818;border:1px solid #1C1C28;border-radius:12px;padding:20px;text-align:center;color:#4B5563;font-size:13px}
.access-section{max-width:560px;margin:0 auto;padding:0 20px 48px}
.includes-box{background:#0D0D14;border:1px solid #1C1C28;border-radius:14px;padding:22px 24px;margin-bottom:28px}
.includes-title{font-size:11px;color:#6B7280;text-transform:uppercase;letter-spacing:2px;margin-bottom:14px;font-weight:600}
.include-item{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px}
.include-check{color:#7C3AED;font-size:14px;flex-shrink:0}
.include-text{font-size:13px;color:#9CA3AF;line-height:1.5}
.access-box{background:#0A0818;border:1px solid #7C3AED44;border-radius:16px;padding:26px 24px}
.access-title{font-size:15px;font-weight:700;color:#fff;margin-bottom:6px}
.access-sub{font-size:13px;color:#4B5563;margin-bottom:18px}
.access-input{width:100%;background:#060608;border:1px solid #1C1C28;border-radius:10px;padding:13px 16px;color:#fff;font-size:15px;margin-bottom:10px;outline:none;letter-spacing:2px;text-transform:uppercase}
.access-input.err{border-color:#DC2626}
.error-msg{color:#F87171;font-size:13px;margin-bottom:10px;display:none}
.access-btn{width:100%;background:#7C3AED;border:none;border-radius:10px;padding:14px;color:#fff;font-size:15px;font-weight:700}
.access-btn:disabled{background:#4C1D95;cursor:default}
.divider{margin-top:18px;padding-top:16px;border-top:1px solid #1C1C28}
.not-bought{font-size:12px;color:#374151;text-align:center;margin-bottom:8px}
.whatsapp-btn{display:block;background:#064E3B;border:1px solid #16A34A44;border-radius:10px;padding:12px;text-align:center;color:#4ADE80;font-size:14px;font-weight:600;text-decoration:none}
.stats-row{display:flex;gap:28px;margin-top:32px;flex-wrap:wrap;justify-content:center}
.stat-item{text-align:center}
.stat-num{font-size:24px;font-weight:900;color:#7C3AED}
.stat-lbl{font-size:12px;color:#374151}
footer{padding:18px 24px;border-top:1px solid #111118;text-align:center;font-size:12px;color:#1F2937;background:#060608;margin-top:auto}
.skill-header{padding:16px 20px;border-bottom-width:1px;border-bottom-style:solid}
.skill-header-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:12px}
.skill-body{max-width:860px;margin:0 auto;padding:28px 20px;width:100%}
.level-tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.level-tab{border-width:2px;border-style:solid;border-radius:10px;padding:9px 16px;font-size:13px;display:flex;align-items:center;gap:6px;background:transparent;transition:all 0.15s}
.level-info{border-radius:12px;padding:20px;margin-bottom:24px;border-width:1px;border-style:solid}
.level-info-top{display:flex;gap:12px;align-items:center;margin-bottom:10px}
.level-count{background:#00000030;border-radius:8px;padding:8px 14px;text-align:center;margin-left:auto}
.level-count-num{font-size:22px;font-weight:800}
.level-count-lbl{font-size:10px;color:#4B5563}
.lesson-cards{display:flex;flex-direction:column;gap:10px}
.lesson-card{background:#0D0D14;border:1px solid #1C1C28;border-radius:12px;padding:18px 20px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:all 0.15s}
.lesson-card:hover{background:#111118}
.lesson-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.lesson-info{flex:1}
.lesson-title-text{font-weight:600;font-size:15px;color:#E5E7EB;margin-bottom:3px}
.lesson-meta{font-size:12px;color:#4B5563}
.level-nav{display:flex;justify-content:space-between;margin-top:28px;gap:10px;flex-wrap:wrap}
.nav-prev{background:#0D0D14;border:1px solid #1C1C28;border-radius:10px;padding:11px 18px;color:#6B7280;font-size:13px}
.nav-next{border:none;border-radius:10px;padding:11px 20px;color:#fff;font-size:13px;font-weight:700}
.lesson-topbar{background:#0A0A12;border-bottom:1px solid #1C1C28;padding:14px 20px;position:sticky;top:0;z-index:10}
.lesson-topbar-inner{max-width:780px;margin:0 auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.back-btn{background:transparent;border:1px solid #1C1C28;color:#6B7280;border-radius:8px;padding:6px 11px;font-size:12px}
.lesson-counter{margin-left:auto;font-size:12px;color:#374151}
.lesson-body{max-width:780px;margin:0 auto;padding:32px 20px 60px;width:100%}
.lesson-img-top{width:100%;border-radius:12px;object-fit:cover;height:220px;display:block;margin-bottom:20px}
.steps-with-img{display:flex;gap:20px;align-items:flex-start}
.steps-side-img{width:38%;flex-shrink:0;border-radius:12px;overflow:hidden}
.steps-side-img img{width:100%;min-height:220px;object-fit:cover;display:block;border-radius:12px}
.steps-list{display:flex;flex-direction:column;gap:8px;flex:1}
.steps-header{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.steps-bar{width:4px;height:20px;border-radius:2px;flex-shrink:0}
.steps-label{font-size:14px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:1px}
.step-item{background:#0D0D14;border:1px solid #1C1C28;border-radius:10px;overflow:hidden}
.step-btn{width:100%;background:transparent;border:none;padding:14px 16px;display:flex;align-items:flex-start;gap:12px;cursor:pointer}
.step-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px;background:#1C1C28;color:#4B5563}
.step-text{font-size:14px;color:#9CA3AF;flex:1;line-height:1.5;text-align:left}
.step-toggle{color:#374151;font-size:16px;flex-shrink:0;margin-top:2px}
.step-expanded{padding:0 16px 16px 52px;color:#9CA3AF;font-size:14px;line-height:1.75;display:none}
.method-box{border-radius:12px;padding:20px;margin-bottom:20px;border:1px solid transparent}
.box-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.box-emoji{font-size:18px}
.box-label{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.box-text{font-size:14px;line-height:1.75;margin:0}
.tip-box{background:#0A100A;border:1px solid #16A34A30;border-radius:10px;padding:16px;margin-bottom:28px}
.lesson-nav{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}
.lesson-nav-prev{background:#0D0D14;border:1px solid #1C1C28;border-radius:10px;padding:12px 18px;color:#6B7280;font-size:13px}
.lesson-nav-next{border:none;border-radius:10px;padding:12px 20px;color:#fff;font-size:13px;font-weight:700}
.lesson-complete{border-radius:10px;padding:12px 20px;font-size:13px;font-weight:700;border:1px solid;background:#0D0D14}
@media(max-width:600px){.steps-with-img{flex-direction:column}.steps-side-img{width:100%}.steps-side-img img{min-height:auto;height:200px}}

    document.getElementById(v).style.display = 'none';
  });
  document.getElementById(id).style.display = 'flex';
  window.scrollTo(0, 0);
}

function setLang(l) {
  lang = l;
  localStorage.setItem('lang', l);
  document.documentElement.lang = l;
  document.documentElement.dir = l === 'ar' ? 'rtl' : 'ltr';
  document.querySelectorAll('.lang-btn').forEach(function(b) {
    var txt = b.textContent.trim();
    b.classList.toggle('active', (l === 'fr' && txt === 'FR') || (l === 'ar' && txt === 'ع') || (l === 'en' && txt === 'EN'));
  });
  if (hasAccess) {
    if (lessonIdx !== null) renderLesson();
    else if (skillId) renderSkill();
    else renderAcademy();
  } else {
    renderLanding();
  }
}

  var err = document.getElementById('access-error');
  var btn = document.getElementById('access-btn');
  if (!val) { err.textContent = t.errEmpty; err.style.display = 'block'; return; }
  if (!CODES.includes(val)) { err.textContent = t.errInvalid; err.style.display = 'block'; return; }
  var used = JSON.parse(localStorage.getItem('usedCodes') || '[]');
  if (used.includes(val)) { err.textContent = t.errUsed; err.style.display = 'block'; return; }
  btn.textContent = t.loading;
  btn.disabled = true;
  setTimeout(function() {
    used.push(val);
    localStorage.setItem('usedCodes', JSON.stringify(used));
    localStorage.setItem('hasAccess', 'true');
    hasAccess = true;
    renderAcademy();
  }, 900);
}

function clearErr() {
  document.getElementById('access-error').style.display = 'none';
  document.getElementById('access-input').classList.remove('err');
  var btn = document.getElementById('access-btn');
  btn.textContent = T[lang].access;
  btn.disabled = false;
}

function renderLanding() {
  var t = T[lang];
  document.getElementById('l-badge').textContent = t.badge;
  document.getElementById('l-title').textContent = t.title;
  document.getElementById('l-subtitle').textContent = t.subtitle;
  document.getElementById('l-f1').textContent = t.f1;
  document.getElementById('l-f2').textContent = t.f2;
  document.getElementById('l-f3').textContent = t.f3;
  document.getElementById('l-f4').textContent = t.f4;
  document.getElementById('l-includes-title').textContent = t.includesTitle;
  document.getElementById('l-includes-list').innerHTML = t.includes.map(function(i) {
    return '<div class="include-item"><span class="include-check">✓</span><span class="include-text">' + i + '</span></div>';
  }).join('');
  document.getElementById('l-already').textContent = t.already;
  document.getElementById('l-enter').textContent = t.enter;
  document.getElementById('access-input').placeholder = t.code;
  document.getElementById('access-btn').textContent = t.access;
  document.getElementById('l-not-bought').textContent = t.notBought;
  document.getElementById('l-whatsapp').textContent = t.whatsapp;
  document.getElementById('l-whatsapp').href = 'https://wa.me/213YOUR_NUMBER?text=' + encodeURIComponent('Je veux acheter la formation');
  document.getElementById('l-footer').textContent = t.footer;
  document.getElementById('l-stats').innerHTML = t.stats.map(function(s) {
    return '<div class="stat-item"><div class="stat-num">' + s.n + '</div><div class="stat-lbl">' + s.l + '</div></div>';
  }).join('');
  showView('landing');
}

function renderAcademy() {
  skillId = null;
  levelIdx = 0;
  lessonIdx = null;
  var t = T[lang];
  document.getElementById('a-badge').textContent = t.aBadge;
  document.getElementById('a-title').textContent = t.aTitle;
  document.getElementById('a-subtitle').textContent = t.aSubtitle;
  document.getElementById('a-features').innerHTML = t.aFeatures.map(function(f) {
    return '<span class="feature-tag">✓ ' + f + '</span>';
  }).join('');
  document.getElementById('a-rec').innerHTML = t.aRec;
  document.getElementById('a-footer').textContent = t.footer;
  document.getElementById('a-skill-cards').innerHTML = SKILLS.map(function(s) {
    return '<div class="skill-card" style="background:' + s.bg + ';border-color:' + s.color + '30" onclick="goSkill(\'' + s.id + '\')" onmouseenter="this.style.borderColor=\'' + s.color + '\'" onmouseleave="this.style.borderColor=\'' + s.color + '30\'"><div class="skill-icon">' + s.icon + '</div><div class="skill-sub" style="color:' + s.accent + '">' + s.subtitle[lang] + '</div><div class="skill-title">' + s.title[lang] + '</div><div class="skill-tagline">' + s.tagline[lang] + '</div><div class="skill-stats"><div class="skill-stat"><span class="stat-label">' + t.firstClient + '</span><span style="color:' + s.accent + ';font-weight:600">' + s.firstClient[lang] + '</span></div><div class="skill-stat"><span class="stat-label">' + t.earning + '</span><span style="color:' + s.accent + ';font-weight:600;font-size:11px">' + s.earning + '</span></div><div class="skill-stat"><span class="stat-label">' + t.startWith + '</span><span style="color:#9CA3AF;font-size:11px">' + s.startTool + '</span></div></div><button class="skill-cta" style="background:' + s.color + '">' + t.startLearning + '</button></div>';
  }).join('');
  showView('academy');
}

function goSkill(id) {
  skillId = id;
  levelIdx = 0;
  lessonIdx = null;
  renderSkill();
}

function goLevel(i) {
  levelIdx = i;
  lessonIdx = null;
  renderSkill();
}

function getLevelStyle(name) {
  var map = { 'Débutant': 'Beginner', 'مبتدئ': 'Beginner', 'Beginner': 'Beginner', 'Intermédiaire': 'Intermediate', 'متوسط': 'Intermediate', 'Intermediate': 'Intermediate', 'Avancé': 'Advanced', 'متقدم': 'Advanced', 'Advanced': 'Advanced', 'Maître': 'Master', 'محترف': 'Master', 'Master': 'Master' };
  var key = map[name] || name;
  return LS[key] || LS.Beginner;
}

function renderSkill() {
  var t = T[lang];
  var skill = SKILLS.find(function(s) { return s.id === skillId; });
  var isAr = lang === 'ar';
  if (!skill) { console.error('Skill not found:', skillId); return; }
  document.getElementById('skill-header').style.background = skill.bg;
  document.getElementById('skill-header').style.borderBottomColor = skill.color + '25';
  document.getElementById('sh-icon').textContent = skill.icon;
  document.getElementById('sh-title').textContent = skill.title[lang];
  document.getElementById('sh-earn').textContent = skill.earning;
  document.getElementById('sh-earn').style.color = skill.accent;
  document.getElementById('s-footer').textContent = t.footer;
  document.getElementById('level-tabs').innerHTML = skill.levels.map(function(lv, i) {
    var style = getLevelStyle(lv.name[lang]);
    var active = i === levelIdx;
    return '<button class="level-tab" onclick="goLevel(' + i + ')" style="background:' + (active ? style.bg : 'transparent') + ';border-color:' + (active ? style.border : '#1C1C28') + ';color:' + (active ? style.text : '#4B5563') + ';font-weight:' + (active ? 700 : 400) + '">' + lv.badge + ' ' + lv.name[lang] + '</button>';
  }).join('');
  var lv = skill.levels[levelIdx];
  var style = getLevelStyle(lv.name[lang]);
  document.getElementById('level-info').style.background = style.bg;
  document.getElementById('level-info').style.borderColor = style.border + '40';
  document.getElementById('level-info').innerHTML = '<div class="level-info-top"><span style="font-size:30px">' + lv.badge + '</span><div><div style="font-size:20px;font-weight:800;color:#fff">' + lv.name[lang] + '</div><div style="font-size:12px;color:#4B5563">' + lv.duration[lang] + '</div></div><div class="level-count" style="' + (isAr ? 'margin-right:auto' : 'margin-left:auto') + '"><div class="level-count-num" style="color:' + style.text + '">' + lv.lessons.length + '</div><div class="level-count-lbl">' + t.lessons + '</div></div></div><p style="color:#6B7280;font-size:13px;margin:0"><strong style="color:#9CA3AF">' + t.goal + ':</strong> ' + lv.goal[lang] + '</p>';
  document.getElementById('lesson-cards').innerHTML = lv.lessons.map(function(les, i) {
    return '<div class="lesson-card" onclick="goLesson(' + i + ')" onmouseenter="this.style.borderColor=\'' + skill.color + '66\'" onmouseleave="this.style.borderColor=\'#1C1C28\'"><span class="lesson-num" style="background:' + skill.color + '22;border:1px solid ' + skill.color + '44;color:' + skill.accent + '">' + (i + 1) + '</span><div class="lesson-info"><div class="lesson-title-text">' + les.title[lang] + '</div><div class="lesson-meta">' + les.steps[lang].length + ' steps</div></div><span style="color:#374151;font-size:20px;flex-shrink:0;transform:' + (isAr ? 'rotate(180deg)' : 'none') + '">→</span></div>';
  }).join('');
  var nav = '';
  if (levelIdx > 0) nav += '<button class="nav-prev" onclick="goLevel(' + (levelIdx - 1) + ')">' + (isAr ? '→' : '←') + ' ' + skill.levels[levelIdx - 1].name[lang] + '</button>';
  else nav += '<button class="nav-prev" onclick="renderAcademy()">' + (isAr ? '→' : '←') + ' ' + t.backSkills + '</button>';
  if (levelIdx < skill.levels.length - 1) nav += '<button class="nav-next" style="background:' + skill.color + '" onclick="goLevel(' + (levelIdx + 1) + ')">' + skill.levels[levelIdx + 1].name[lang] + ' ' + (isAr ? '←' : '→') + '</button>';
  document.getElementById('level-nav').innerHTML = nav;
  showView('skill-view');
}

function goLesson(i) {
  lessonIdx = i;
  openStep = null;
  renderLesson();
}

function prevLesson() {
  lessonIdx--;
  openStep = null;
  renderLesson();
}

function nextLesson() {
  lessonIdx++;
  openStep = null;
  renderLesson();
}

function nextLevel() {
  levelIdx++;
  lessonIdx = null;
  renderSkill();
}

function toggleStep(i) {
  openStep = openStep === i ? null : i;
  renderLesson();
}

function renderLesson() {
  var t = T[lang];
  var skill = SKILLS.find(function(s) { return s.id === skillId; });
  if (!skill) { console.error('Skill not found'); return; }
  var lv = skill.levels[levelIdx];
  if (!lv) { console.error('Level not found'); return; }
  var les = lv.lessons[lessonIdx];
  if (!les) { console.error('Lesson not found'); return; }
  var style = getLevelStyle(lv.name[lang]);
  var isAr = lang === 'ar';
  var isMobile = window.innerWidth < 600;
  var steps = les.steps[lang];
  var layout = les.layout || 'top';
  var showLeft = layout === 'left' && !isMobile;
  var showRight = layout === 'right' && !isMobile;
  document.getElementById('lesson-back-btn').textContent = (isAr ? '→' : '←') + ' ' + t.back.replace(/[←→]/g, '').trim();
  document.getElementById('lesson-back-btn').onclick = function() { renderSkill(); };
  document.getElementById('lesson-skill-icon').textContent = skill.icon;
  document.getElementById('lesson-skill-name').textContent = skill.title[lang];
  document.getElementById('lesson-level-name').textContent = lv.name[lang];
  document.getElementById('lesson-level-name').style.color = style.text;
  document.getElementById('lesson-counter').textContent = t.lesson + ' ' + (lessonIdx + 1) + ' ' + t.of + ' ' + lv.lessons.length;
  document.getElementById('lv-footer').textContent = t.footer;
  var imgTop = '', imgSide = '';
  if (les.image && (layout === 'top' || isMobile)) {
    imgTop = '<img class="lesson-img-top" src="' + les.image + '" alt="' + les.title[lang] + '" loading="lazy">';
  } else if (les.image && (showLeft || showRight)) {
    imgSide = '<div class="steps-side-img"><img src="' + les.image + '" alt="' + les.title[lang] + '" loading="lazy"></div>';
  }
  var stepsHTML = steps.map(function(step, i) {
    var isOpen = openStep === i;
    var preview = step.length > 80 && !isOpen ? step.substring(0, 80) + '…' : step;
    return '<div class="step-item" style="border-color:' + (isOpen ? skill.color + '60' : '#1C1C28') + '"><button class="step-btn" onclick="toggleStep(' + i + ')"><span class="step-num" style="' + (isOpen ? 'background:' + skill.color + ';color:#fff' : '') + '">' + (i + 1) + '</span><span class="step-text" style="color:' + (isOpen ? '#fff' : '#9CA3AF') + ';font-weight:' + (isOpen ? 600 : 400) + ';text-align:' + (isAr ? 'right' : 'left') + '">' + preview + '</span><span class="step-toggle">' + (isOpen ? '▲' : '▼') + '</span></button>' + (isOpen ? '<div class="step-expanded" style="display:block;padding:' + (isAr ? '0 52px 16px 16px' : '0 16px 16px 52px') + '">' + step + '</div>' : '') + '</div>';
  }).join('');
  var stepsWrap = '';
  if (showLeft) stepsWrap = '<div class="steps-with-img">' + imgSide + '<div class="steps-list">' + stepsHTML + '</div></div>';
  else if (showRight) stepsWrap = '<div class="steps-with-img" style="flex-direction:row-reverse">' + imgSide + '<div class="steps-list">' + stepsHTML + '</div></div>';
  else stepsWrap = '<div class="steps-list">' + stepsHTML + '</div>';
  var hasPrev = lessonIdx > 0;
  var hasNext = lessonIdx < lv.lessons.length - 1;
  var hasNextLv = levelIdx < skill.levels.length - 1;
  var prevBtn = hasPrev ? '<button class="lesson-nav-prev" onclick="prevLesson()">' + (isAr ? '→' : '←') + ' ' + t.prevLesson.replace(/[←→]/g, '').trim() + '</button>' : '<button class="lesson-nav-prev" onclick="renderSkill()">' + (isAr ? '→' : '←') + ' ' + t.back.replace(/[←→]/g, '').trim() + '</button>';
  var nextBtn = hasNext ? '<button class="lesson-nav-next" style="background:' + skill.color + '" onclick="nextLesson()">' + t.nextLesson.replace(/[←→]/g, '').trim() + ' ' + (isAr ? '←' : '→') + '</button>' : hasNextLv ? '<button class="lesson-nav-next" style="background:' + skill.color + '" onclick="nextLevel()">' + t.nextLevel + ': ' + skill.levels[levelIdx + 1].name[lang] + ' ' + (isAr ? '←' : '→') + '</button>' : '<div class="lesson-complete" style="color:' + skill.accent + ';border-color:' + skill.color + '50">' + t.complete + '</div>';
  document.getElementById('lesson-body').innerHTML = '<div style="margin-bottom:20px"><span style="background:' + style.bg + ';border:1px solid ' + style.border + ';color:' + style.text + ';border-radius:8px;padding:4px 12px;font-size:12px;font-weight:600">' + style.badge + ' ' + lv.name[lang] + '</span><span style="font-size:12px;color:#374151;margin-left:8px">' + t.lesson + ' ' + (lessonIdx + 1) + '</span></div><h1 style="font-size:clamp(20px,4vw,28px);font-weight:800;color:#fff;margin:0 0 24px;line-height:1.25">' + les.title[lang] + '</h1>' + imgTop + '<div style="margin-bottom:28px"><div class="steps-header"><div class="steps-bar" style="background:' + skill.color + '"></div><span class="steps-label">' + t.howTo + '</span></div>' + stepsWrap + '</div><div class="method-box" style="background:#0A0E18;border-color:' + skill.color + '30"><div class="box-header"><span class="box-emoji">🧠</span><span class="box-label" style="color:' + skill.accent + '">' + t.bestWay + '</span></div><p class="box-text" style="color:#9CA3AF">' + les.method[lang] + '</p></div><div class="method-box" style="background:#0E0A00;border-color:#92400E40"><div class="box-header"><span class="box-emoji">💪</span><span class="box-label" style="color:#FCD34D">' + t.exercise + '</span></div><p class="box-text" style="color:#D97706">' + les.exercise[lang] + '</p></div>' + (les.tip ? '<div class="tip-box"><p style="color:#6B7280;font-size:13px;line-height:1.65;margin:0">' + les.tip[lang] + '</p></div>' : '') + '<div class="lesson-nav">' + prevBtn + nextBtn + '</div>';
  showView('lesson-view');
}

// ===== INIT =====
(function() {
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.querySelectorAll('.lang-btn').forEach(function(b) {
    var txt = b.textContent.trim();
    b.classList.toggle('active', (lang === 'fr' && txt === 'FR') || (lang === 'ar' && txt === 'ع') || (lang === 'en' && txt === 'EN'));
  });
  if (hasAccess) renderAcademy();
  else renderLanding();
})();
</script>
</body>
</html>
