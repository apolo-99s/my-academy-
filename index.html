<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Skills Academy 🇩🇿</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LANDING -->
<div id="landing">
  <nav>
    <div class="brand" onclick="goHome()"><span>Digital</span>Skills.dz</div>
    <div class="lang-btns">
      <button class="lang-btn" onclick="setLang('fr')">FR</button>
      <button class="lang-btn" onclick="setLang('ar')">ع</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
  </nav>
  <div class="hero glass">
    <div class="hero-badge" id="l-badge"></div>
    <h1 id="l-title"></h1>
    <p id="l-subtitle"></p>
    <div class="features">
      <span class="feature-tag" id="l-f1"></span>
      <span class="feature-tag" id="l-f2"></span>
      <span class="feature-tag" id="l-f3"></span>
      <span class="feature-tag" id="l-f4"></span>
    </div>
  </div>
  <div class="access-section" style="margin-top:32px">
    <div class="includes-box glass">
      <div class="includes-title" id="l-includes-title"></div>
      <div id="l-includes-list"></div>
    </div>
    <div class="access-box glass">
      <div class="access-title" id="l-already"></div>
      <div class="access-sub" id="l-enter"></div>
      <input type="text" class="access-input glass" id="access-input" oninput="clearErr()" onkeydown="if(event.key==='Enter')checkAccess()">
      <div class="error-msg" id="access-error"></div>
      <button class="access-btn glass-btn" id="access-btn" onclick="checkAccess()"></button>
      <div class="divider"></div>
      <div class="not-bought" id="l-not-bought"></div>
      <a class="whatsapp-btn glass-btn" id="l-whatsapp" href="#" target="_blank"></a>
    </div>
    <div class="stats-row" id="l-stats"></div>
  </div>
  <footer id="l-footer"></footer>
</div>

<!-- ACADEMY -->
<div id="academy">
  <nav>
    <div class="brand" onclick="goHome()"><span>Digital</span>Skills.dz</div>
    <div class="nav-actions">
      <button class="dash-btn" onclick="goDashboard()">📊 <span id="nav-dash-label"></span></button>
      <div class="lang-btns">
        <button class="lang-btn" onclick="setLang('fr')">FR</button>
        <button class="lang-btn" onclick="setLang('ar')">ع</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
      </div>
    </div>
  </nav>
  <div class="hero glass">
    <div class="hero-badge" id="a-badge"></div>
    <h1 id="a-title"></h1>
    <p id="a-subtitle"></p>
    <div class="features" id="a-features"></div>
  </div>
  <div class="skill-cards" id="a-skill-cards"></div>
  <div class="recommendation"><div class="rec-box glass" id="a-rec"></div></div>
  <footer id="a-footer"></footer>
</div>

<!-- SKILL VIEW -->
<div id="skill-view">
  <nav>
    <div class="brand" onclick="goHome()"><span>Digital</span>Skills.dz</div>
    <div class="nav-actions">
      <button class="dash-btn" onclick="goDashboard()">📊 <span id="nav-dash-label-2"></span></button>
      <div class="lang-btns">
        <button class="lang-btn" onclick="setLang('fr')">FR</button>
        <button class="lang-btn" onclick="setLang('ar')">ع</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
      </div>
    </div>
  </nav>
  <div class="skill-header glass" id="skill-header">
    <div class="skill-header-inner">
      <span id="sh-icon" style="font-size:26px"></span>
      <div>
        <div id="sh-title" style="font-weight:800;font-size:17px;color:#fff"></div>
        <div id="sh-earn" style="font-size:11px"></div>
      </div>
    </div>
  </div>
  <div class="skill-body">
    <div class="level-tabs" id="level-tabs"></div>
    <div class="level-info glass" id="level-info"></div>
    <div class="lesson-cards" id="lesson-cards"></div>
    <div class="level-nav" id="level-nav"></div>
  </div>
  <footer id="s-footer"></footer>
</div>

<!-- LESSON VIEW -->
<div id="lesson-view">
  <div class="lesson-topbar glass">
    <div class="lesson-topbar-inner">
      <button class="back-btn glass-btn" id="lesson-back-btn"></button>
      <span id="lesson-skill-icon" style="font-size:16px"></span>
      <span id="lesson-skill-name" style="font-size:12px;color:#4B5563"></span>
      <span style="font-size:12px;color:#4B5563">/</span>
      <span id="lesson-level-name" style="font-size:12px"></span>
      <span class="lesson-counter" id="lesson-counter"></span>
    </div>
  </div>
  <div class="lesson-body" id="lesson-body"></div>
  <footer id="lv-footer"></footer>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <nav>
    <div class="brand" onclick="goHome()"><span>Digital</span>Skills.dz</div>
    <div class="nav-actions">
      <div class="lang-btns">
        <button class="lang-btn" onclick="setLang('fr')">FR</button>
        <button class="lang-btn" onclick="setLang('ar')">ع</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
      </div>
    </div>
  </nav>
  <div class="dash-body">
    <h1 id="dash-title" style="font-size:clamp(20px,4vw,28px);font-weight:800;color:#fff;margin:0 0 6px"></h1>
    <p id="dash-subtitle" style="color:#6B7280;font-size:14px;margin:0 0 24px"></p>

    <div class="dash-summary glass">
      <div class="dash-ring">
        <svg viewBox="0 0 88 88">
          <circle class="dash-ring-bg" cx="44" cy="44" r="36"></circle>
          <circle class="dash-ring-fg" id="dash-ring-fg" cx="44" cy="44" r="36"></circle>
        </svg>
        <div class="dash-ring-label" id="dash-ring-label"></div>
      </div>
      <div class="dash-summary-text">
        <h2 id="dash-summary-title"></h2>
        <p id="dash-summary-sub"></p>
      </div>
      <button class="dash-continue" id="dash-continue-btn"></button>
    </div>

    <div class="dash-grid" id="dash-grid"></div>
  </div>
  <footer id="dash-footer"></footer>
</div>

<script src="data.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase-client.js"></script>
<script src="progress.js"></script>
<script src="app.js"></script>
<script src="dashboard.js"></script>
</body>
</html>
