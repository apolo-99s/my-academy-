<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Skills Academy 🇩🇿</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060608;color:#E5E7EB;font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
button{cursor:pointer;font-family:inherit}
input{font-family:inherit}

/* ALL VIEWS HIDDEN BY DEFAULT */
#landing,#academy,#skill-view,#lesson-view{display:none;flex-direction:column;min-height:100vh}

/* NAV */
nav{padding:16px 24px;border-bottom:1px solid #111118;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;background:#060608;position:sticky;top:0;z-index:100}
.brand{font-weight:800;font-size:16px;color:#fff}
.brand span{color:#7C3AED}
.lang-btns{display:flex;gap:6px}
.lang-btn{background:transparent;border:1px solid #1C1C28;color:#6B7280;border-radius:8px;padding:5px 12px;font-size:13px;font-weight:400;transition:all 0.15s}
.lang-btn.active{background:#7C3AED;border-color:#7C3AED;color:#fff;font-weight:700}

/* HERO */
.hero{background:linear-gradient(180deg,#0D0818 0%,#060608 100%);padding:52px 20px 44px;text-align:center;border-bottom:1px solid #1C1C28}
.hero-badge{display:inline-block;background:#0D0818;border:1px solid #7C3AED44;border-radius:6px;padding:5px 14px;margin-bottom:18px;font-size:11px;color:#A78BFA;letter-spacing:3px;text-transform:uppercase}
.hero h1{font-size:clamp(26px,6vw,52px);font-weight:900;margin:0 0 14px;background:linear-gradient(135deg,#fff 30%,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:pre-line}
.hero p{color:#6B7280;font-size:16px;max-width:520px;margin:0 auto 32px;line-height:1.65}
.features{display:flex;justify-content:center;flex-wrap:wrap;gap:12px;font-size:13px;color:#4B5563}
.feature-tag{background:#0F0F18;border:1px solid #1C1C28;border-radius:20px;padding:6px 14px}

/* SKILL CARDS */
.skill-cards{max-width:860px;margin:44px auto;padding:0 20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.skill-card{border-radius:16px;padding:26px;cursor:pointer;transition:all 0.2s;border:2px solid transparent}
.skill-card:hover{transform:translateY(-3px)}
.skill-icon{font-size:44px;margin-bottom:14px}
.skill-sub{font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.skill-title{font-size:22px;font-weight:800;color:#fff;margin:0 0 8px}
.skill-tagline{color:#6B7280;font-size:13px;line-height:1.5;margin:0 0 18px}
.skill-stats{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;border-top:1px solid #ffffff10;padding-top:14px}
.skill-stat{display:flex;justify-content:space-between;font-size:12px}
.stat-label{color:#4B5563}
.skill-cta{border-radius:8px;padding:10px;text-align:center;font-weight:700;font-size:14px;color:#fff;border:none;width:100%}

/* RECOMMENDATION */
.recommendation{max-width:860px;margin:0 auto 32px;padding:0 20px}
.rec-box{background:#0D0818;border:1px solid #1C1C28;border-radius:12px;padding:20px;text-align:center;color:#4B5563;font-size:13px}

/* LANDING ACCESS */
.access-section{max-width:560px;margin:0 auto;padding:0 20px 48px}
.includes-box{background:#0D0D14;border:1px solid #1C1C28;border-radius:14px;padding:22px 24px;margin-bottom:28px}
.includes-title{font-size:11px;color:#6B7280;text-transform:uppercase;letter-spacing:2px;margin-bottom:14px;font-weight:600}
.include-item{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px}
.include-check{color:#7C3AED;font-size:14px;flex-shrink:0}
.include-text{font-size:13px;color:#9CA3AF;line-height:1.5}
.access-box{background:#0A0818;border:1px solid #7C3AED44;border-radius:16px;padding:26px 24px}
.access-title{font-size:15px;font-weight:700;color:#fff;margin-bottom:6px}
.access-sub{font-size:13px;color:#4B5563;margin-bottom:18px}
.access-input{width:100%;background:#060608;border:1px solid #1C1C28;border-radius:10px;padding:13px 16px;color:#fff;font-size:15px;margin-bottom:10px;outline:none;letter-spacing:2px;text-transform:uppercase}
.access-input.err{border-color:#DC2626}
.error-msg{color:#F87171;font-size:13px;margin-bottom:10px;display:none}
.access-btn{width:100%;background:#7C3AED;border:none;border-radius:10px;padding:14px;color:#fff;font-size:15px;font-weight:700}
.access-btn:disabled{background:#4C1D95;cursor:default}
.divider{margin-top:18px;padding-top:16px;border-top:1px solid #1C1C28}
.not-bought{font-size:12px;color:#374151;text-align:center;margin-bottom:8px}
.whatsapp-btn{display:block;background:#064E3B;border:1px solid #16A34A44;border-radius:10px;padding:12px;text-align:center;color:#4ADE80;font-size:14px;font-weight:600;text-decoration:none}
.stats-row{display:flex;gap:28px;margin-top:32px;flex-wrap:wrap;justify-content:center}
.stat-item{text-align:center}
.stat-num{font-size:24px;font-weight:900;color:#7C3AED}
.stat-lbl{font-size:12px;color:#374151}

/* FOOTER */
footer{padding:18px 24px;border-top:1px solid #111118;text-align:center;font-size:12px;color:#1F2937;background:#060608;margin-top:auto}

/* SKILL VIEW */
.skill-header{padding:16px 20px;border-bottom-width:1px;border-bottom-style:solid}
.skill-header-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:12px}
.skill-body{max-width:860px;margin:0 auto;padding:28px 20px;width:100%}
.level-tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.level-tab{border-width:2px;border-style:solid;border-radius:10px;padding:9px 16px;font-size:13px;display:flex;align-items:center;gap:6px;background:transparent;transition:all 0.15s}
.level-info{border-radius:12px;padding:20px;margin-bottom:24px;border-width:1px;border-style:solid}
.level-info-top{display:flex;gap:12px;align-items:center;margin-bottom:10px}
.level-count{background:#00000030;border-radius:8px;padding:8px 14px;text-align:center;margin-left:auto}
.level-count-num{font-size:22px;font-weight:800}
.level-count-lbl{font-size:10px;color:#4B5563}
.lesson-cards{display:flex;flex-direction:column;gap:10px}
.lesson-card{background:#0D0D14;border:1px solid #1C1C28;border-radius:12px;padding:18px 20px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:all 0.15s}
.lesson-card:hover{background:#111118}
.lesson-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.lesson-info{flex:1}
.lesson-title-text{font-weight:600;font-size:15px;color:#E5E7EB;margin-bottom:3px}
.lesson-meta{font-size:12px;color:#4B5563}
.level-nav{display:flex;justify-content:space-between;margin-top:28px;gap:10px;flex-wrap:wrap}
.nav-prev{background:#0D0D14;border:1px solid #1C1C28;border-radius:10px;padding:11px 18px;color:#6B7280;font-size:13px}
.nav-next{border:none;border-radius:10px;padding:11px 20px;color:#fff;font-size:13px;font-weight:700}

/* LESSON VIEW */
.lesson-topbar{background:#0A0A12;border-bottom:1px solid #1C1C28;padding:14px 20px;position:sticky;top:0;z-index:10}
.lesson-topbar-inner{max-width:780px;margin:0 auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.back-btn{background:transparent;border:1px solid #1C1C28;color:#6B7280;border-radius:8px;padding:6px 11px;font-size:12px}
.lesson-counter{margin-left:auto;font-size:12px;color:#374151}
.lesson-body{max-width:780px;margin:0 auto;padding:32px 20px 60px;width:100%}
.lesson-img-top{width:100%;border-radius:12px;object-fit:cover;height:220px;display:block;margin-bottom:20px}
.steps-with-img{display:flex;gap:20px;align-items:flex-start}
.steps-side-img{width:38%;flex-shrink:0;border-radius:12px;overflow:hidden}
.steps-side-img img{width:100%;min-height:220px;object-fit:cover;display:block;border-radius:12px}
.steps-list{display:flex;flex-direction:column;gap:8px;flex:1}
.steps-header{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.steps-bar{width:4px;height:20px;border-radius:2px;flex-shrink:0}
.steps-label{font-size:14px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:1px}
.step-item{background:#0D0D14;border:1px solid #1C1C28;border-radius:10px;overflow:hidden}
.step-btn{width:100%;background:transparent;border:none;padding:14px 16px;display:flex;align-items:flex-start;gap:12px;cursor:pointer}
.step-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px;background:#1C1C28;color:#4B5563}
.step-text{font-size:14px;color:#9CA3AF;flex:1;line-height:1.5;text-align:left}
.step-toggle{color:#374151;font-size:16px;flex-shrink:0;margin-top:2px}
.step-expanded{padding:0 16px 16px 52px;color:#9CA3AF;font-size:14px;line-height:1.75;display:none}
.method-box{border-radius:12px;padding:20px;margin-bottom:20px;border:1px solid transparent}
.box-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.box-emoji{font-size:18px}
.box-label{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.box-text{font-size:14px;line-height:1.75;margin:0}
.tip-box{background:#0A100A;border:1px solid #16A34A30;border-radius:10px;padding:16px;margin-bottom:28px}
.lesson-nav{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}
.lesson-nav-prev{background:#0D0D14;border:1px solid #1C1C28;border-radius:10px;padding:12px 18px;color:#6B7280;font-size:13px}
.lesson-nav-next{border:none;border-radius:10px;padding:12px 20px;color:#fff;font-size:13px;font-weight:700}
.lesson-complete{border-radius:10px;padding:12px 20px;font-size:13px;font-weight:700;border:1px solid;background:#0D0D14}

@media(max-width:600px){
.steps-with-img{flex-direction:column}
.steps-side-img{width:100%}
.steps-side-img img{min-height:auto;height:200px}
}
</style>
</head>

       goal:{fr:'Apprendre les 4 règles visuelles et créer vos premiers designs dans Canva',ar:'تعلم 4 قواعد التصميم وتصنع أول تصاميمك في Canva',en:'Learn the 4 visual rules and create your first real designs in Canva'},
       lessons:[
         {id:'d-b-1',title:{fr:'Comment installer et utiliser Canva',ar:'كيفاش تنصب وتستعمل Canva',en:'How to Install & Use Canva'},
          image:'https://images.unsplash.com/photo-1626785774573-4b799315345d?w=800&q=80',layout:'top',
          steps:{fr:['Allez sur canva.com ou téléchargez l\'app depuis Google Play ou App Store.','Cliquez S\'inscrire et créez un compte gratuit avec votre email ou Google.','Cliquez Créer un design en haut du tableau de bord.','Choisissez Post Instagram Carré — canvas vierge 1080x1080px.','Panneau GAUCHE: Templates, Éléments, Texte, Arrière-plan, Téléchargements.','Barre du HAUT: contrôles de police, couleurs, position.','Ctrl+Z pour annuler. Ctrl+D pour dupliquer.','Bouton Partager → Télécharger → PNG pour réseaux ou PDF pour impression.'],ar:['روح لـ canva.com ولا حمّل التطبيق من Google Play أو App Store.','اضغط سجّل وأنشئ حساب مجاني بإيميلك أو Google.','اضغط إنشاء تصميم في الأعلى.','اختار منشور Instagram — canvas فارغ 1080x1080px.','اللوحة اليسرى: Templates، عناصر، نص، خلفية، تحميلات.','شريط الأعلى: خطوط، ألوان، موضع.','Ctrl+Z للتراجع. Ctrl+D للنسخ.','زر مشاركة → تحميل → PNG للسوشيال أو PDF للطباعة.'],en:['Go to canva.com or download the app from Google Play or App Store.','Click Sign Up and create a free account with your email or Google.','Click Create a design at the top of the dashboard.','Choose Instagram Post Square — blank 1080x1080px canvas.','LEFT panel: Templates, Elements, Text, Background, Uploads.','TOP toolbar: font controls, colors, position.','Ctrl+Z to undo. Ctrl+D to duplicate.','Share button → Download → PNG for social or PDF for print.']},
          method:{fr:'Ouvrez Canva maintenant et passez 20 minutes à cliquer sur chaque bouton. Ne dessinez rien — explorez juste. Cette session est votre vraie leçon.',ar:'افتح Canva الآن واقضِ 20 دقيقة تضغط على كل زر. ما تصمّمش شيء — بس استكشف.',en:'Open Canva right now and spend 20 minutes clicking every button. Do not design anything — just explore.'},
          exercise:{fr:'Créez un post Instagram avec votre nom en grand texte gras et un fond coloré. Téléchargez-le.',ar:'صنع منشور Instagram باسمك بخط كبير وخلفية ملونة. حمّله.',en:'Create an Instagram post with your name in big bold text and a colored background. Download it.'},
          tip:{fr:'💡 Canva Gratuit vous donne 250 000+ templates. Passez à Pro seulement après avoir des clients payants.',ar:'💡 Canva المجاني يعطيك +250,000 قالب. انتقل للـ Pro بس بعد ما تجيك زبائن.',en:'💡 Canva Free gives you 250,000+ templates. Only upgrade after you have paying clients.'}},
         {id:'d-b-2',title:{fr:'Les 4 Règles du Design CARP',ar:'4 قواعد التصميم CARP',en:'The 4 Design Rules CARP'},
          image:'https://images.unsplash.com/photo-1561070791-2526d30994b5?w=800&q=80',layout:'right',
          steps:{fr:['CONTRASTE: Rendez la chose la plus importante la plus grande ou la plus différente.','ALIGNEMENT: Rien placé au hasard. Activez les guides: Vue → Afficher règles.','RÉPÉTITION: Même police, même couleur, même style pour les éléments similaires.','PROXIMITÉ: Groupez les choses qui vont ensemble. Séparez ce qui ne va pas.','Pratiquez: Ouvrez un template Canva. Identifiez chaque règle dans chaque élément.','Cherchez flyer algérie restaurant sur Google. Identifiez les règles respectées et brisées.'],ar:['التباين: خلّي الحاجة المهمة أكبر أو أختلف.','المحاذاة: ما كاين والو موضوع بالعشوائية. فعّل الخطوط: عرض → أظهر الخطوط.','التكرار: نفس الخط، نفس اللون، نفس الستايل للعناصر المتشابهة.','القرب: جمّع الأشياء اللي تمشي مع بعض. فرّق ما لا يمشي.','تمرّن: افتح قالب Canva. حدّد كل قاعدة في كل عنصر.','دور على flyer algérie restaurant في Google. حدّد القواعد المتّبعة والمكسورة.'],en:['CONTRAST: Make the most important thing the biggest or most different.','ALIGNMENT: Nothing placed randomly. Enable guides: View → Show Rulers.','REPETITION: Same font, same color, same style for similar elements.','PROXIMITY: Group things that belong together. Separate what does not.','Practice: Open a Canva template. Identify each rule in each element.','Search flyer algerie restaurant on Google. Identify rules followed and broken.']},
          method:{fr:'Brisez les 4 règles délibérément dans un design puis recréez-le correctement. La comparaison rend les règles inoubliables.',ar:'اكسر الـ4 قواعد بالقصد في تصميم ثم أعد إنشاؤه صح. المقارنة تخلّيك ما تنساش.',en:'Break all 4 rules deliberately in one design then recreate it correctly. The comparison makes rules unforgettable.'},
          exercise:{fr:'Designez Restaurant El Baraka Alger comme carte de visite DEUX FOIS: Version 1 = violez les 4 règles. Version 2 = respectez-les parfaitement.',ar:'صمّم مطعم البركة الجزائر كبطاقة أعمال مرتين: نسخة 1 = اكسر الـ4 قواعد. نسخة 2 = اتبّعها.',en:'Design Restaurant El Baraka Alger as a business card TWICE: Version 1 violate all 4 rules. Version 2 follow them perfectly.'},
          tip:{fr:'💡 Les designers professionnels brisent les règles seulement APRÈS les avoir maîtrisées.',ar:'💡 المصممون المحترفون يكسرون القواعد بس بعد ما يتقنوها.',en:'💡 Professional designers break rules only AFTER mastering them.'}},
         {id:'d-b-3',title:{fr:'Théorie des Couleurs',ar:'نظرية الألوان',en:'Color Theory'},
          image:'https://images.unsplash.com/photo-1525909002-1b05e0c869d8?w=800&q=80',layout:'left',
          steps:{fr:['coolors.co — génère des palettes harmonieuses. Espace = nouvelle palette.','Émotions: Rouge=urgence. Bleu=confiance. Vert=nature. Jaune=bonheur. Noir=luxe.','Règle 60-30-10: Principal 60% fonds, Secondaire 30% titres, Accent 10% boutons.','Extraire couleurs photo: Canva → image → pipette → appliquez aux textes.','Vérifier harmonie: color.adobe.com → Complémentaire → bougez la roue.','Maximum 3 couleurs par design en tant que débutant.'],ar:['coolors.co — يولّد باليتات منسجمة. مسافة = باليت جديد.','المشاعر: أحمر=إلحاح. أزرق=ثقة. أخضر=طبيعة. أصفر=سعادة. أسود=فخامة.','قاعدة 60-30-10: رئيسي 60% خلفيات، ثانوي 30% عناوين، accent 10% أزرار.','استخراج ألوان صورة: Canva → صورة → قطّارة → طبّق على النصوص.','تحقق الانسجام: color.adobe.com → تكميلي → حرّك العجلة.','أقصاه 3 ألوان في تصميم واحد وأنت مبتدئ.'],en:['coolors.co generates harmonious palettes. Space = new palette.','Emotions: Red=urgency. Blue=trust. Green=nature. Yellow=happiness. Black=luxury.','60-30-10 rule: Main 60% backgrounds, Secondary 30% titles, Accent 10% buttons.','Extract colors from photo: Canva → image → eyedropper → apply to text.','Check harmony: color.adobe.com → Complementary → move the wheel.','Maximum 3 colors per design as a beginner.']},
          method:{fr:'Analysez les pages Instagram de 5 marques algériennes. Pour chaque post populaire: couleur principale, émotion, nombre de couleurs.',ar:'حلّل صفحات Instagram لـ5 علامات جزائرية. لكل منشور شهير: اللون الرئيسي، المشاعر، عدد الألوان.',en:'Analyze Instagram pages of 5 Algerian brands. For each popular post: main color, emotion, number of colors.'},
          exercise:{fr:'Générez 5 palettes sur coolors.co. Pour chacune: nommez un type entreprise algérienne et expliquez pourquoi les couleurs correspondent.',ar:'ولّد 5 باليتات على coolors.co. لكل واحدة: سمّي نوع مشروع جزائري وشرح لماذا الألوان تناسبه.',en:'Generate 5 palettes on coolors.co. For each name an Algerian business type and explain why colors fit.'},
          tip:{fr:'💡 En cas de doute: texte noir sur blanc + UNE couleur accent. Toujours professionnel.',ar:'💡 في حالة الشك: نص أسود على أبيض + لون accent واحد. دائماً يبان محترف.',en:'💡 When in doubt: black text on white + ONE accent color. Always looks professional.'}},
         {id:'d-b-4',title:{fr:'Typographie',ar:'الخطوط',en:'Typography'},
          image:'https://images.unsplash.com/photo-1586717791821-3f44a563fa4c?w=800&q=80',layout:'top',
          steps:{fr:['fonts.google.com — 1400+ polices gratuites. Serif=formel. Sans-serif=moderne.','Maximum 2 familles: une décorative pour TITRES une lisible pour CORPS.','Hiérarchie: Titre 36-72px. Sous-titre 18-28px. Corps 14-16px.','Dans Canva: cliquez texte → nom police → recherchez → sélectionnez.','Espacement lettres MAJUSCULES: Canva → Espacement → +50 à +150 pour look premium.','Évitez: Comic Sans, Papyrus, Times New Roman.'],ar:['fonts.google.com — +1400 خط مجاني. Serif=رسمي. Sans-serif=عصري.','أقصاه عائلتين: واحد زخرفي للعناوين وواحد واضح للنص.','الهرمية: عنوان 36-72px. فرعي 18-28px. نص 14-16px.','في Canva: اضغط نص → اسم الخط → ابحث → اختار.','تباعد الحروف الكبيرة: Canva → تباعد → +50 إلى +150 للمظهر الفاخر.','تجنّب: Comic Sans، Papyrus، Times New Roman.'],en:['fonts.google.com 1400+ free fonts. Serif=formal. Sans-serif=modern.','Maximum 2 families: one decorative for TITLES one readable for BODY.','Hierarchy: Title 36-72px. Subtitle 18-28px. Body 14-16px.','In Canva: click text → font name → search → select.','Letter spacing UPPERCASE: Canva → Spacing → +50 to +150 for premium look.','Avoid: Comic Sans, Papyrus, Times New Roman.']},
          method:{fr:'Allez sur fontpair.co — parcourez 20 associations. Pour chacune: quel type entreprise convient-il?',ar:'روح لـ fontpair.co — شوف 20 تركيبة. لكل واحدة: أنهي نوع مشروع يناسبها؟',en:'Go to fontpair.co browse 20 pairings. For each: what type of business does this suit?'},
          exercise:{fr:'Designez la même carte de visite 4 fois: Classique, Moderne, Créative, Premium. Laquelle pour restaurant, cabinet, boutique?',ar:'صمّم نفس بطاقة الأعمال 4 مرات: كلاسيكي، عصري، إبداعي، فاخر. أيها لمطعم، مكتب، بوتيك؟',en:'Design the same business card 4 times: Classic Modern Creative Premium. Which for restaurant office boutique?'},
          tip:{fr:'💡 Pour arabe: Cairo, Tajawal ou Noto Kufi Arabic — Google Fonts modernes gratuits.',ar:'💡 للعربية: Cairo، Tajawal أو Noto Kufi Arabic — خطوط Google عصرية ومجانية.',en:'💡 For Arabic: Cairo, Tajawal, or Noto Kufi Arabic — modern free Google Fonts.'}},
         {id:'d-b-5',title:{fr:'Créer un Logo de Zéro',ar:'إنشاء شعار من الصفر',en:'Create a Logo from Zero'},
          image:'https://images.unsplash.com/photo-1600132806370-bf17e65e942f?w=800&q=80',layout:'right',
          steps:{fr:['Brief: Nom? Activité? Clients? 3 adjectifs décrivant la marque?','Recherche: logo + secteur sur Google. 10 logos concurrents.','Esquisse: 10 concepts en 15 minutes sur papier. Sans effacement.','Canva: Taille 500x500px. Éléments → icônes. Icône + nom. 3 couleurs.','Test N&B: Téléchargez avec filtre noir et blanc. Si encore beau = vrai logo.','Livraison: PNG transparent, PNG blanc, PNG noir, PDF impression.'],ar:['البريف: الاسم؟ النشاط؟ الزبائن؟ 3 صفات للعلامة؟','البحث: logo + القطاع في Google. 10 شعارات منافسين.','الرسم: 10 أفكار في 15 دقيقة على الورق. بلا محو.','Canva: حجم 500x500px. عناصر → أيقونات. أيقونة + اسم. 3 ألوان.','اختبار أسود/أبيض: حمّل بفلتر. إذا زال يبان زين = شعار حقيقي.','التسليم: PNG شفاف، PNG أبيض، PNG أسود، PDF طباعة.'],en:['Brief: Name? Activity? Customers? 3 adjectives describing the brand?','Research: logo + industry on Google. 10 competitor logos.','Sketch: 10 concepts in 15 minutes on paper. No erasing.','Canva: Size 500x500px. Elements → icons. Icon + name. 3 colors.','B&W test: Download with black and white filter. If still good = real logo.','Delivery: PNG transparent PNG white PNG black PDF print.']},
          method:{fr:'RE-CRÉEZ des logos existants. Prenez Djezzy ou Ooredoo et reconstruisez dans Canva.',ar:'أعد إنشاء شعارات موجودة. خذ Djezzy أو Ooredoo وأعد بناؤها في Canva.',en:'RE-CREATE existing logos. Take Djezzy or Ooredoo and rebuild in Canva.'},
          exercise:{fr:'Logo complet pour ATLAS café premium algérien: 3 variantes couleur, 1 noir, 1 blanc. 3 phrases expliquant chaque choix.',ar:'شعار كامل لـ ATLAS قهوة جزائرية فاخرة: 3 ألوان، نسخة سوداء، بيضاء. 3 جمل تشرح كل اختيار.',en:'Complete logo for ATLAS premium Algerian café: 3 color variants 1 black 1 white. 3 sentences explaining each choice.'},
          tip:{fr:'💡 Les logos les plus professionnels sont les plus simples. Apple = une pomme. Nike = un swoosh.',ar:'💡 أكثر الشعارات احترافية هي الأبسط. Apple = تفاحة. Nike = swoosh.',en:'💡 The most professional logos are the simplest. Apple = an apple. Nike = a swoosh.'}}
       ]},
      {name:{fr:'Intermédiaire',ar:'متوسط',en:'Intermediate'},badge:'⚡',duration:{fr:'Semaines 5–10',ar:'الأسابيع 5–10',en:'Weeks 5–10'},
       goal:{fr:'Passer de Canva à Photoshop construire de vrais projets clients',ar:'الانتقال من Canva لـ Photoshop وبناء مشاريع حقيقية',en:'Move from Canva to Photoshop build real client projects'},
       lessons:[
         {id:'d-i-1',title:{fr:'Photopea — Photoshop Gratuit',ar:'Photopea — بديل Photoshop المجاني',en:'Photopea — Free Photoshop Alternative'},
          image:'https://images.unsplash.com/photo-1572044162444-ad60f128bdea?w=800&q=80',layout:'left',
          steps:{fr:['photopea.com fonctionne dans le navigateur identique à Photoshop à 99% gratuit.','Interface: Gauche=Outils. Droite=Calques. Haut=Options. Centre=Canvas.','CALQUES: Feuilles transparentes empilées. Chaque élément sur son propre calque.','Ouvrir photo: Fichier → Ouvrir. Double-cliquez Arrière-plan → OK pour déverrouiller.','Supprimer fond: Baguette magique → cliquez fond → Delete. Complexe: Sélection → Objet.','Texte: T → cliquez canvas → tapez → changez police taille couleur.','Exporter: Fichier → Exporter → Exporter sous → PNG cochez Transparence ou JPEG.'],ar:['photopea.com يشتغل في المتصفح شبه Photoshop بـ99% مجاني.','الواجهة: يسار=أدوات. يمين=طبقات. أعلى=خيارات. وسط=Canvas.','الطبقات: أوراق شفافة مكدّسة. كل عنصر على طبقته الخاصة.','فتح صورة: ملف → فتح. انقر مرتين الخلفية → OK لفتحها.','إزالة خلفية: عصا سحرية → اضغط الخلفية → Delete. معقد: تحديد → موضوع.','نص: T → اضغط Canvas → اكتب → غيّر الخط الحجم اللون.','تصدير: ملف → تصدير → تصدير كـ → PNG فعّل الشفافية أو JPEG.'],en:['photopea.com runs in browser 99% identical to Photoshop free.','Interface: Left=Tools. Right=Layers. Top=Options. Center=Canvas.','LAYERS: Transparent sheets stacked. Each element on its own layer.','Open photo: File → Open. Double-click Background → OK to unlock.','Remove background: Magic Wand → click background → Delete. Complex: Select → Subject.','Text: T → click canvas → type → change font size color.','Export: File → Export → Export As → PNG check Transparency or JPEG.']},
          method:{fr:'Sur Photopea: ouvrez un produit supprimez arrière-plan ajoutez fond coloré + texte prix. Simulation parfaite pub.',ar:'على Photopea: افتح منتج ازل الخلفية زيد خلفية ملونة + نص سعر. محاكاة إعلان حقيقي.',en:'On Photopea: open a product remove background add colored background + price text. Perfect ad simulation.'},
          exercise:{fr:'Photo produit algérien: supprimez fond dans Photopea placez sur blanc ajoutez prix + nom + ombre. Exportez PNG.',ar:'صورة منتج جزائري: ازل الخلفية في Photopea حطّها على أبيض زيد سعر + اسم + ظل. صدّر PNG.',en:'Algerian product photo: remove background in Photopea place on white add price + name + shadow. Export PNG.'},
          tip:{fr:'💡 Ombre: clic droit calque → Fusion → Ombre portée → opacité 40% distance 10px flou 20px.',ar:'💡 الظل: انقر يمين الطبقة → خيارات المزج → ظل مسقط → شفافية 40% مسافة 10px تعتيم 20px.',en:'💡 Shadow: right-click layer → Blending Options → Drop Shadow → opacity 40% distance 10px blur 20px.'}}
       ]},
      {name:{fr:'Avancé',ar:'متقدم',en:'Advanced'},badge:'🔥',duration:{fr:'Semaines 11–20',ar:'الأسابيع 11–20',en:'Weeks 11–20'},
       goal:{fr:'Maîtriser Illustrator livrer des identités complètes fixer des tarifs professionnels',ar:'إتقان Illustrator تسليم هويات كاملة تحديد أسعار احترافية',en:'Master Illustrator deliver full brand identities set professional rates'},
       lessons:[
         {id:'d-a-1',title:{fr:'Adobe Illustrator Vecteurs',ar:'Adobe Illustrator الفيكتور',en:'Adobe Illustrator Vectors'},
          image:'https://images.unsplash.com/photo-1558655146-d09347e92766?w=800&q=80',layout:'right',
          steps:{fr:['Inkscape inkscape.org 100% gratuit très similaire à Illustrator.','Vecteurs: un logo vectoriel adapte de carte de visite à panneau 10m sans perte.','Outil Plume P: Cliquez=angle droit. Cliquez+glissez=courbe. Cliquez départ=fermer.','Tracer logo: Importez image → verrouillez calque → nouveau calque → tracez Plume.','Pathfinder: Unir fusionner Soustraction soustraire Intersection chevaucher.','Couleurs: sélectionnez forme → carré Remplissage bas gauche → entrez code hex.'],ar:['Inkscape inkscape.org مجاني 100% شبيه جداً بـ Illustrator.','الفيكتور: شعار فيكتور يتكيّف من بطاقة لإعلان 10م بدون فقدان جودة.','أداة القلم P: اضغط=زاوية مستقيمة. اضغط+اسحب=منحنى. اضغط البداية=أغلق.','تتبع شعار: استورد صورة → اقفل الطبقة → طبقة جديدة → تتبّع بالقلم.','Pathfinder: توحيد دمج طرح إزالة تقاطع الاحتفاظ بالتداخل.','الألوان: اختار شكل → مربع التعبئة أسفل يسار → أدخل كود hex.'],en:['Inkscape inkscape.org 100% free very similar to Illustrator.','Vectors: a vector logo scales from business card to 10m billboard without quality loss.','Pen Tool P: Click=straight corner. Click+drag=curve. Click start=close shape.','Trace logo: Import image → lock layer → new layer → trace with Pen Tool.','Pathfinder: Unite merge Minus Front subtract Intersect overlap only.','Colors: select shape → Fill square bottom left → enter hex code.']},
          method:{fr:'Imprimez un logo simple 3-5 formes. Tracez chaque forme avec UNIQUEMENT Outil Plume dans Inkscape. Répétez pour 5 logos sur une semaine.',ar:'اطبع شعاراً بسيطاً 3-5 أشكال. تتبّع كل شكل بأداة القلم فقط في Inkscape. كرّر لـ5 شعارات على أسبوع.',en:'Print a simple logo 3-5 shapes. Trace every shape with ONLY the Pen Tool in Inkscape. Repeat for 5 logos over one week.'},
          exercise:{fr:'Recréez logo Ooredoo ou Djezzy dans Inkscape: Outil Plume + Pathfinder uniquement. Comparez au logo original.',ar:'أعد إنشاء شعار Ooredoo أو Djezzy في Inkscape: أداة القلم + Pathfinder فقط. قارن مع الأصل.',en:'Recreate Ooredoo or Djezzy logo in Inkscape: Pen Tool + Pathfinder only. Compare to the original.'},
          tip:{fr:'💡 Client avec logo JPEG: proposez de le redessiner en vectoriel. Facturez 3000-8000 DZD. Durée 30-90 minutes.',ar:'💡 زبون بشعار JPEG: اقترح إعادة رسمه كفيكتور. اشحن 3000-8000 دج. المدة 30-90 دقيقة.',en:'💡 Client with JPEG logo: offer to redraw as vector. Charge 3000-8000 DZD. Duration 30-90 minutes.'}}
       ]},
      {name:{fr:'Maître',ar:'محترف',en:'Master'},badge:'👑',duration:{fr:'Mois 6+',ar:'الشهر 6+',en:'Month 6+'},
       goal:{fr:'Diriger une agence de design embaucher des juniors',ar:'إدارة أجنسي تصميم توظيف مساعدين',en:'Run a design agency hire juniors'},
       lessons:[
         {id:'d-m-1',title:{fr:'De Freelance à Agence',ar:'من فريلانس لأجنسي',en:'From Freelancer to Agency'},
          image:'https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=800&q=80',layout:'top',
          steps:{fr:['Bon moment: travail constant > capacité seul ET vous refusez des projets. Pas avant.','Collaborateur: votre meilleur étudiant ou designer en ligne. Paiement par projet.','Rôles: Vous=acquisition propositions qualité. Eux=exécution. Payez-les 40-50%.','Marque agence: Nom logo Instagram site Carrd.co gratuit 30 min.','Forfaits: Starter 25K/mois. Croissance 55K/mois. Premium 100K+/mois. DZD','Ciblez les agences publicitaires: 1 client agence = 10 clients individuels.'],ar:['الوقت المناسب: عمل مستمر > طاقتك وحدك وترفض مشاريع. مش قبل.','المتعاون: أحسن طالب أو مصمم أونلاين. دفع بالمشروع.','الأدوار: أنت=استقطاب عروض جودة. هم=تنفيذ. ادفع لهم 40-50%.','علامة الأجنسي: اسم شعار Instagram موقع Carrd.co مجاني 30 دقيقة.','الباقات: Starter 25K/شهر. نمو 55K/شهر. Premium 100K+/شهر. دج','استهدف وكالات الإعلان: زبون أجنسي واحد = 10 زبائن أفراد.'],en:['Right time: constant work > your capacity alone AND refusing projects. Not before.','Collaborator: your best student or online designer. Pay per project.','Roles: You=acquisition proposals quality. Them=execution. Pay them 40-50%.','Agency brand: Name logo Instagram Carrd.co site free 30 min.','Packages: Starter 25K/month. Growth 55K/month. Premium 100K+/month. DZD','Target advertising agencies: 1 agency client = 10 individual clients.']},
          method:{fr:'Fake pitch: trouvez entreprise avec mauvais design. Refaites logo + 3 posts gratuitement. Envoyez: Je voulais vous montrer ce qui est possible.',ar:'عرض وهمي: لقّي مشروعاً بتصميم ضعيف. أعد تصميم الشعار + 3 منشورات مجاناً. أرسل: أردت أن أريك ما هو ممكن.',en:'Fake pitch: find business with bad design. Redo logo + 3 posts for free. Send: I wanted to show you what is possible.'},
          exercise:{fr:'Identifiez 3 entreprises algériennes avec design faible. Refonte non sollicitée pour 1: logo + 2 posts. Message prospection. Publiez comme concept.',ar:'حدّد 3 مشاريع جزائرية بتصميم ضعيف. إعادة تصميم غير مطلوبة لواحد: شعار + 2 منشور. رسالة تواصل. انشر كمشروع مفهوم.',en:'Identify 3 Algerian businesses with weak design. Unsolicited redesign for 1: logo + 2 posts. Outreach message. Publish as concept project.'},
          tip:{fr:'💡 Stratégie la plus rapide: spécialisez-vous dans UN secteur. Les spécialistes facturent toujours plus.',ar:'💡 أسرع استراتيجية: تخصّص في قطاع واحد. المتخصصون دائماً يشحنون أكثر.',en:'💡 Fastest strategy: specialize in ONE sector. Specialists always charge more.'}}
       ]}
    ]

  {
    id:'smm',icon:'📱',color:'#059669',accent:'#34D399',bg:'#021A12',
    earning:'15,000 – 60,000 DZD/month',
    firstClient:{fr:'2–3 semaines',ar:'2–3 أسابيع',en:'2–3 weeks'},
    startTool:'Meta Business Suite + Canva',
    title:{fr:'Social Media Management',ar:'إدارة السوشيال ميديا',en:'Social Media Management'},
    subtitle:{fr:'Marketing Digital',ar:'التسويق الرقمي',en:'Digital Marketing'},
    tagline:{fr:'Aidez les entreprises à grandir et vendre en ligne',ar:'ساعد المشاريع تكبر وتبيع أونلاين',en:'Help businesses grow their audience and sell online'},
    levels:[
      {name:{fr:'Débutant',ar:'مبتدئ',en:'Beginner'},badge:'🌱',duration:{fr:'Semaines 1–3',ar:'الأسابيع 1–3',en:'Weeks 1–3'},
       goal:{fr:'Comprendre les algorithmes et créer votre première stratégie de contenu',ar:'تفهم الخوارزميات وتصنع أول استراتيجية محتوى',en:'Understand algorithms and create your first content strategy'},
       lessons:[
         {id:'s-b-1',title:{fr:'Configurer un Compte Business',ar:'إعداد حساب Business',en:'Set Up a Business Account'},
          image:'https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=800&q=80',layout:'top',
          steps:{fr:['Instagram: Profil → 3 lignes → Paramètres → Compte → Passer en compte professionnel → Business.','Facebook: facebook.com/pages/create → Entreprise → nom + catégorie → remplissez TOUS les champs.','Meta Business Suite: business.facebook.com → connectez Page + Instagram → gère les deux.','WhatsApp Business: téléchargez app → numéro professionnel → liez dans Facebook. Indispensable Algérie.','Profil 100%: photo bio 80 chars lien bio linktr.ee gratuit localisation bouton contact.','Dossier Contenu Client: Photos Vidéos Légendes Posts approuvés.'],ar:['Instagram: بروفيل → 3 خطوط → إعدادات → حساب → تحويل لحساب محترف → Business.','Facebook: facebook.com/pages/create → مشروع → اسم + فئة → اكمل كل الحقول.','Meta Business Suite: business.facebook.com → اربط الصفحة + Instagram → تدير الاثنين.','WhatsApp Business: حمّل التطبيق → رقم احترافي → اربط في Facebook. ضروري للجزائر.','بروفيل 100%: صورة bio 80 حرف رابط bio linktr.ee مجاني موقع زر تواصل.','مجلد محتوى الزبون: صور فيديوهات تعليقات منشورات معتمدة.'],en:['Instagram: Profile → 3 lines → Settings → Account → Switch to Professional → Business.','Facebook: facebook.com/pages/create → Business → name + category → fill in EVERY field.','Meta Business Suite: business.facebook.com → connect Page + Instagram → manages both.','WhatsApp Business: download app → business number → link in Facebook. Essential Algeria.','Profile 100%: photo bio 80 chars bio link linktr.ee free location contact button.','Create Client Content folder: Photos Videos Captions Approved posts.']},
          method:{fr:'Créez un compte test Instagram avec un nouvel email. Appelez-le DZFoodTestAccount. Votre bac à sable pour tester chaque stratégie.',ar:'أنشئ حساب Instagram تجريبي بإيميل جديد. سمّيه DZFoodTestAccount. صندوق رملك لتجربة كل استراتيجية.',en:'Create a test Instagram account with a new email. Call it DZFoodTestAccount. Your sandbox to test every strategy.'},
          exercise:{fr:'Configurez un profil business complet pour un restaurant fictif sur Instagram ET Facebook. Connectez les deux à Meta Business Suite. Capturez le profil 100% comme preuve.',ar:'اعدد بروفيل business كامل لمطعم وهمي على Instagram وFacebook. اربط الاثنين بـ Meta Business Suite. صوّر البروفيل 100% كدليل.',en:'Set up a complete business profile for a fictional restaurant on Instagram AND Facebook. Connect both to Meta Business Suite. Screenshot the 100% complete profile as proof.'},
          tip:{fr:'💡 Lien en bio: utilisez linktr.ee pour une page gratuite avec plusieurs boutons WhatsApp Facebook Menu Maps.',ar:'💡 رابط البروفيل: استخدم linktr.ee لصفحة مجانية بعدة أزرار WhatsApp Facebook قائمة خرائط.',en:'💡 Bio link: use linktr.ee to create a free page with multiple buttons WhatsApp Facebook Menu Maps.'}},
         {id:'s-b-2',title:{fr:'Comment Fonctionne Algorithme Instagram',ar:'كيفاش تشتغل خوارزمية Instagram',en:'How the Instagram Algorithm Works'},
          image:'https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=800&q=80',layout:'right',
          steps:{fr:['Algorithme a UN objectif: garder les gens sur app. Montre contenu le plus susceptible engager.','5 signaux: 1.SAUVEGARDES fort. 2.PARTAGES. 3.COMMENTAIRES +10 mots. 4.LIKES. 5.TEMPS VISIONNAGE.','Ingéniez sauvegardes: terminez chaque post éducatif par Sauvegardez ce post.','Ingéniez commentaires: question spécifique fin légende. Entre tajine et couscous ce week-end?','Insights: post → Voir les insights. Comptes touchés impressions interactions.','Meilleures heures Algérie: 12h-13h30, 18h-20h, 21h-23h.'],ar:['الخوارزمية لها هدف واحد: تبقّي الناس على التطبيق. تعرض المحتوى الأكثر تفاعلاً.','5 إشارات: 1.الحفظ الأقوى. 2.المشاركة. 3.التعليقات +10 كلمات. 4.الإعجابات. 5.وقت المشاهدة.','اهندس الحفظ: اختم كل منشور تعليمي بـ احفظ هذا المنشور.','اهندس التعليقات: سؤال محدد في نهاية التعليق. بين الطاجين والكسكس هذا الويكند؟','Insights: منشور → عرض الإحصائيات. الحسابات المُوصَلة مرات الظهور التفاعلات.','أفضل أوقات الجزائر: 12-13:30، 18-20، 21-23.'],en:['Algorithm has ONE goal: keep people on the app. Shows content most likely to engage.','5 signals: 1.SAVES strongest. 2.SHARES. 3.COMMENTS 10+ words. 4.LIKES. 5.WATCH TIME.','Engineer saves: end every educational post with Save this post.','Engineer comments: specific question at end. Between tajine and couscous this weekend?','Insights: post → View Insights. Accounts reached impressions interactions.','Best times Algeria: 12pm-1:30pm 6pm-8pm 9pm-11pm.']},
          method:{fr:'Regardez 20 derniers posts comptes avec fort engagement. Pour chacun: question dans légende? CTA sauvegarde? Notez le pattern.',ar:'شوف آخر 20 منشور للحسابات بتفاعل عالٍ. لكل واحد: سؤال في التعليق؟ CTA للحفظ؟ لاحظ النمط.',en:'Look at last 20 posts from accounts with high engagement. For each: question in caption? Save CTA? Note the pattern.'},
          exercise:{fr:'Sur votre compte test: publiez 3 posts en 3 jours. Post 1: photo sans CTA. Post 2: carrousel + Sauvegardez. Post 3: photo + question. Comparez Insights après 48h.',ar:'على حسابك التجريبي: انشر 3 منشورات في 3 أيام. منشور 1: صورة بدون CTA. منشور 2: كاروسيل + احفظ. منشور 3: صورة + سؤال. قارن Insights بعد 48 ساعة.',en:'On your test account: publish 3 posts over 3 days. Post 1: photo no CTA. Post 2: carousel + Save. Post 3: photo + question. Compare Insights after 48h.'},
          tip:{fr:'💡 Instagram supprime posts avec liens externes dans LÉGENDE. Toujours dire lien en bio.',ar:'💡 Instagram يُخفّض المنشورات التي تحتوي روابط في التعليق. دائماً قل الرابط في البروفيل.',en:'💡 Instagram suppresses posts with external links in the CAPTION. Always say link in bio.'}}
       ]},
      {name:{fr:'Intermédiaire',ar:'متوسط',en:'Intermediate'},badge:'⚡',duration:{fr:'Semaines 4–9',ar:'الأسابيع 4–9',en:'Weeks 4–9'},
       goal:{fr:'Créer des Reels lancer des pubs gérer votre premier vrai client',ar:'إنشاء Reels إطلاق إعلانات إدارة أول زبون حقيقي',en:'Create Reels run ads manage your first real client'},
       lessons:[
         {id:'s-i-1',title:{fr:'Créer un Reel qui Génère de Vraies Vues',ar:'إنشاء Reel يحصل على مشاهدات حقيقية',en:'Create a Reel That Gets Real Views'},
          image:'https://images.unsplash.com/photo-1598550476439-6847785fcea6?w=800&q=80',layout:'top',
          steps:{fr:['Règle 0.5 seconde: premier frame doit stopper le scroll. JAMAIS logo ou écran intro.','Structure: Accroche 0-2s Setup 2-8s Payoff 8-20s CTA dernières 2s.','Tournage: téléphone VERTICAL 9:16. Caméra arrière. Regardez OBJECTIF pas écran.','CapCut: Nouveau projet → clips → Split pour couper → Texte → Auto Captions.','Audio tendance: onglet Reels → flèche tendance → utilisez cet audio.','Sous-titres obligatoires: 60% regardent sans son. CapCut → Texte → Sous-titres automatiques.'],ar:['قاعدة 0.5 ثانية: أول إطار يجب أن يوقف التمرير. أبداً لا شعار أو شاشة مقدمة.','الهيكل: خطّاف 0-2 ث إعداد 2-8 ث النتيجة 8-20 ث CTA آخر 2 ث.','التصوير: هاتف عمودي 9:16. الكاميرا الخلفية. انظر للعدسة مش الشاشة.','CapCut: مشروع جديد → كليبات → Split للقطع → نص → تعليقات تلقائية.','الصوت الرائج: تبويب Reels → سهم الترند → استخدم هذا الصوت.','ترجمة إلزامية: 60% يشاهدون بدون صوت. CapCut → نص → تعليقات تلقائية.'],en:['0.5 second rule: first frame must stop the scroll. NEVER a logo or intro screen.','Structure: Hook 0-2s Setup 2-8s Payoff 8-20s CTA last 2s.','Filming: phone VERTICAL 9:16. Back camera. Look at LENS not screen.','CapCut: New project → clips → Split to cut → Text → Auto Captions.','Trending audio: Reels tab → trending arrow → use this audio.','Subtitles mandatory: 60% watch without sound. CapCut → Text → Auto Captions.']},
          method:{fr:'Regardez Reels 20 minutes consciemment pour étudier. Chaque Reel qui vous garde 5s+: pause. Quest-ce qui était accroche? Notez résultats.',ar:'شاهد Reels 20 دقيقة بوعي للدراسة. كل Reel يبقيك +5 ثوانٍ: توقف. ما كان الخطّاف؟ دوّن نتائجك.',en:'Watch Reels consciously for 20 minutes to study. Every Reel that keeps you 5s+: pause. What was the hook? Note your findings.'},
          exercise:{fr:'Filmez et éditez 3 Reels: 1 Avant Après. 2 3 Conseils éducatif. 3 Coulisses. Publiez sur compte test. Comparez vues après 48h.',ar:'صوّر وعدّل 3 Reels: 1 قبل/بعد. 2 3 نصائح تعليمي. 3 كواليس. انشر على حسابك التجريبي. قارن المشاهدات بعد 48 ساعة.',en:'Film and edit 3 Reels: 1 Before After. 2 Educational 3 Tips. 3 Behind the scenes. Post on test account. Compare views after 48h.'},
          tip:{fr:'💡 Publiez votre meilleur Reel à 19h heure algérienne. Utilisez Meta Business Suite pour programmer.',ar:'💡 انشر أفضل Reel لديك الساعة 7 مساءً بالتوقيت الجزائري. استخدم Meta Business Suite للجدولة.',en:'💡 Post your best Reel at 7pm Algeria time. Use Meta Business Suite to schedule in advance.'}}
       ]},
      {name:{fr:'Avancé',ar:'متقدم',en:'Advanced'},badge:'🔥',duration:{fr:'Semaines 10–18',ar:'الأسابيع 10–18',en:'Weeks 10–18'},
       goal:{fr:'Développer des stratégies complètes gérer plusieurs clients',ar:'تطوير استراتيجيات كاملة إدارة عدة زبائن',en:'Develop full strategies manage multiple clients'},
       lessons:[
         {id:'s-a-1',title:{fr:'Document de Stratégie Social Media',ar:'وثيقة استراتيجية سوشيال ميديا',en:'Social Media Strategy Document'},
          image:'https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=800&q=80',layout:'top',
          steps:{fr:['Section 1 Audit: followers taux engagement top 5 posts analysés démographie fréquence.','Section 2 Concurrents: 3-5 directs. Followers engagement contenu fréquence. Identifiez GAPS.','Section 3 Persona: profil fictif complet. Nom âge ville job revenus objectifs habitudes.','Section 4 Objectifs SMART: Augmenter engagement de 1.2% à 4.5% en 90 jours.','Section 5 Stratégie 90 jours: plateformes piliers mix formats fréquence hashtags pubs.','Présentez en PDF Canva designé. Vous positionne comme premium avant que client voie tarifs.'],ar:['القسم 1 التدقيق: المتابعون معدل التفاعل أفضل 5 منشورات محللة ديموغرافية تكرار النشر.','القسم 2 المنافسون: 3-5 مباشرين. متابعون تفاعل محتوى تكرار. حدّد الثغرات.','القسم 3 الشخصية: ملف خيالي كامل. الاسم العمر المدينة العمل الدخل الأهداف العادات.','القسم 4 أهداف SMART: زيادة التفاعل من 1.2% إلى 4.5% في 90 يوماً.','القسم 5 استراتيجية 90 يوماً: منصات ركائز مزيج صيغ تكرار هاشتاقات إعلانات.','قدّمها كـ PDF Canva مصمّم. يضعك كخيار premium قبل أن يرى الزبون أسعارك.'],en:['Section 1 Audit: followers engagement rate top 5 posts analyzed demographics posting frequency.','Section 2 Competitors: 3-5 direct. Followers engagement content frequency. Identify GAPS.','Section 3 Persona: complete fictional profile. Name age city job income goals habits.','Section 4 SMART Goals: Increase engagement from 1.2% to 4.5% in 90 days.','Section 5 90-day strategy: platforms pillars format mix frequency hashtags ads.','Present as designed Canva PDF. Positions you as premium before client sees your rates.']},
          method:{fr:'Rédigez votre premier document pour une vraie entreprise locale même si elle ne vous a pas engagé. Envoyez-le en cadeau gratuit. Taux de réponse extrêmement élevé.',ar:'اكتب أول وثيقة لمشروع محلي حقيقي حتى لو لم يوظّفك. أرسلها كهدية مجانية. معدل استجابة مرتفع جداً.',en:'Write your first document for a real local business even if they have not hired you. Send it as a free gift. Extremely high response rate.'},
          exercise:{fr:'Document complet min 8 pages PDF Canva pour une entreprise algérienne. Toutes les 5 sections.',ar:'وثيقة كاملة 8 ص PDF Canva على الأقل لمشروع جزائري. كل الأقسام الخمسة.',en:'Complete document min 8 pages Canva PDF for an Algerian business. All 5 sections.'},
          tip:{fr:'💡 Ne dites jamais je pense. Dites les données montrent. La confiance par les données = ce que les clients paient.',ar:'💡 لا تقل أبداً أعتقد. قل البيانات تُظهر. الثقة بالبيانات هي ما يدفع الزبائن.',en:'💡 Never say I think. Say the data shows. Confidence backed by data is what clients pay for.'}}
       ]},
      {name:{fr:'Maître',ar:'محترف',en:'Master'},badge:'👑',duration:{fr:'Mois 5+',ar:'الشهر 5+',en:'Month 5+'},
       goal:{fr:'Construire une agence SMM avec clients récurrents',ar:'بناء أجنسي SMM مع زبائن متكررين',en:'Build an SMM agency with recurring clients'},
       lessons:[
         {id:'s-m-1',title:{fr:'Construire une Agence SMM',ar:'بناء أجنسي SMM',en:'Build an SMM Agency'},
          image:'https://images.unsplash.com/photo-1556761175-4b46a572b786?w=800&q=80',layout:'top',
          steps:{fr:['Mindset: freelance vend son temps. Agence vend des résultats. Garantissez des métriques spécifiques.','Garantie: définissez quelle métrique vous livrez avec confiance. Continuez gratuitement si vous manquez.','Premier membre: Community Manager 3-4h/jour. 15000-25000 DZD/mois. Groupes Facebook Algeria.','Tarification: Starter 15K/mois. Croissance 35K/mois. Premium 65K+/mois. DZD','Acquisition: Référrals 10% commission DMs Instagram froids partenariats designers devs.','Case study: documentez 1 succès client avant actions après. Instagram carousel + PDF.'],ar:['العقلية: فريلانسر يبيع وقته. أجنسي يبيع النتائج. اضمن مقاييس محددة.','الضمان: حدّد أي مقياس تسلّمه بثقة. استمر مجاناً إذا فاتتك الهدف.','أول عضو: مدير مجتمع 3-4 ساعات/يوم. 15000-25000 دج/شهر. مجموعات Facebook الجزائر.','التسعير: Starter 15K/شهر. نمو 35K/شهر. Premium +65K/شهر. دج','الاستقطاب: إحالات عمولة 10% DMs Instagram باردة شراكات مصممين مطورين.','دراسة الحالة: وثّق نجاح زبون واحد قبل الإجراءات بعد. كاروسيل Instagram + PDF.'],en:['Mindset: freelancer sells time. Agency sells results. Guarantee specific metrics.','Guarantee: define what metric you confidently deliver. Continue free if you miss the target.','First member: Community Manager 3-4h/day. 15000-25000 DZD/month. Algeria Facebook groups.','Pricing: Starter 15K/month. Growth 35K/month. Premium 65K+/month. DZD','Acquisition: Referrals 10% commission cold Instagram DMs partnerships designers devs.','Case study: document 1 client success before actions after. Instagram carousel + PDF.']},
          method:{fr:'Documentez UNE histoire de succès: métriques avant ce que vous avez fait métriques 3 mois après. Ce contenu vous apportera plus de clients que tout discours commercial.',ar:'وثّق قصة نجاح واحدة: المقاييس قبل ما فعلته المقاييس 3 أشهر بعد. هذا المحتوى يجلب أكثر من أي عرض بيع.',en:'Document ONE success story: metrics before what you did metrics 3 months after. This content brings more clients than any sales pitch.'},
          exercise:{fr:'Modèle affaires sur 1 page: votre niche 3 forfaits avec prix votre garantie 3 canaux acquisition objectif revenus 6 mois.',ar:'نموذج عمل في صفحة واحدة: نيشتك 3 باقات مع أسعار ضمانك 3 قنوات استقطاب هدف الإيرادات 6 أشهر.',en:'Business model on 1 page: your niche 3 packages with prices your guarantee 3 acquisition channels 6-month revenue goal.'},
          tip:{fr:'💡 Chemin le plus rapide: 1 client → résultats exceptionnels → 1 référral → répétez. Pas besoin site ou pub pour commencer.',ar:'💡 أسرع طريق: زبون 1 → نتائج استثنائية → إحالة 1 → كرّر. لا تحتاج موقع أو إعلانات للبدء.',en:'💡 Fastest path: 1 client → exceptional results → 1 referral → repeat. No need for website or ads to start.'}}
       ]}
    ]
  },
  {
    id:'video',icon:'🎬',color:'#DC2626',accent:'#F87171',bg:'#1A0303',
    earning:'8,000 – 80,000 DZD/project',
    firstClient:{fr:'4–6 semaines',ar:'4–6 أسابيع',en:'4–6 weeks'},

// ═══════════════════════
// STATE
// ═══════════════════════
let lang=localStorage.getItem('lang')||'fr';
let hasAccess=localStorage.getItem('hasAccess')==='true';
let skillId=null,levelIdx=0,lessonIdx=null,openStep=null;

// ═══════════════════════
// SHOW VIEW
// ═══════════════════════
function showView(id){
  ['landing','academy','skill-view','lesson-view'].forEach(v=>{
    document.getElementById(v).style.display='none';
  });
  document.getElementById(id).style.display='flex';
  window.scrollTo(0,0);
}

// ═══════════════════════
// LANGUAGE
// ═══════════════════════
function setLang(l){
  lang=l;
  localStorage.setItem('lang',l);
  document.documentElement.lang=l;
  document.documentElement.dir=l==='ar'?'rtl':'ltr';
  document.querySelectorAll('.lang-btn').forEach(b=>{
    const lbl=b.textContent.trim();
    b.classList.toggle('active',(l==='fr'&&lbl==='FR')||(l==='ar'&&lbl==='ع')||(l==='en'&&lbl==='EN'));
  });
  if(hasAccess){
    if(lessonIdx!==null)renderLesson();
    else if(skillId)renderSkill();
    else renderAcademy();
  }else{
    renderLanding();
  }
}

// ═══════════════════════
// ACCESS
// ═══════════════════════
function checkAccess(){
  const t=T[lang];
  const val=document.getElementById('access-input').value.trim().toUpperCase();
  const errEl=document.getElementById('access-error');
  const btn=document.getElementById('access-btn');
  if(!val){errEl.textContent=t.errEmpty;errEl.style.display='block';return;}
  if(!CODES.includes(val)){errEl.textContent=t.errInvalid;errEl.style.display='block';return;}
  const used=JSON.parse(localStorage.getItem('usedCodes')||'[]');
  if(used.includes(val)){errEl.textContent=t.errUsed;errEl.style.display='block';return;}
  btn.textContent=t.loading;btn.disabled=true;
  setTimeout(()=>{
    used.push(val);
    localStorage.setItem('usedCodes',JSON.stringify(used));
    localStorage.setItem('hasAccess','true');
    hasAccess=true;
    renderAcademy();
  },900);
}
function clearErr(){
  document.getElementById('access-error').style.display='none';
  document.getElementById('access-input').classList.remove('err');
  const btn=document.getElementById('access-btn');
  btn.textContent=T[lang].access;btn.disabled=false;
}

function renderLanding(){

  document.getElementById('l-title').textContent=t.title;
  document.getElementById('l-subtitle').textContent=t.subtitle;
  document.getElementById('l-f1').textContent=t.f1;
  document.getElementById('l-f2').textContent=t.f2;
  document.getElementById('l-f3').textContent=t.f3;
  document.getElementById('l-f4').textContent=t.f4;
  document.getElementById('l-includes-title').textContent=t.includesTitle;
  document.getElementById('l-includes-list').innerHTML=t.includes.map(i=>`<div class="include-item"><span class="include-check">✓</span><span class="include-text">${i}</span></div>`).join('');
  document.getElementById('l-already').textContent=t.already;
  document.getElementById('l-enter').textContent=t.enter;
  document.getElementById('access-input').placeholder=t.code;
  document.getElementById('access-btn').textContent=t.access;
  document.getElementById('l-not-bought').textContent=t.notBought;
  document.getElementById('l-whatsapp').textContent=t.whatsapp;
  document.getElementById('l-whatsapp').href=`https://wa.me/213YOUR_NUMBER?text=${encodeURIComponent('Je veux acheter la formation')}`;
  document.getElementById('l-footer').textContent=t.footer;
  document.getElementById('l-stats').innerHTML=t.stats.map(s=>`<div class="stat-item"><div class="stat-num">${s.n}</div><div class="stat-lbl">${s.l}</div></div>`).join('');

}

// RENDER ACADEMY
// ═══════════════════════
function renderAcademy(){
  skillId=null;levelIdx=0;lessonIdx=null;
  const t=T[lang];
  document.getElementById('a-badge').textContent=t.aBadge;
  document.getElementById('a-title').textContent=t.aTitle;
  document.getElementById('a-subtitle').textContent=t.aSubtitle;
  document.getElementById('a-features').innerHTML=t.aFeatures.map(f=>`<span class="feature-tag">✓ ${f}</span>`).join('');
  document.getElementById('a-rec').innerHTML=t.aRec;
  document.getElementById('a-footer').textContent=t.footer;
  document.getElementById('a-skill-cards').innerHTML=SKILLS.map(s=>`
    <div class="skill-card" style="background:${s.bg};border-color:${s.color}30" onclick="goSkill('${s.id}')"
      onmouseenter="this.style.borderColor='${s.color}'" onmouseleave="this.style.borderColor='${s.color}30'">
      <div class="skill-icon">${s.icon}</div>
      <div class="skill-sub" style="color:${s.accent}">${s.subtitle[lang]}</div>
      <div class="skill-title">${s.title[lang]}</div>
      <div class="skill-tagline">${s.tagline[lang]}</div>
      <div class="skill-stats">
        <div class="skill-stat"><span class="stat-label">${t.firstClient}</span><span style="color:${s.accent};font-weight:600">${s.firstClient[lang]}</span></div>
        <div class="skill-stat"><span class="stat-label">${t.earning}</span><span style="color:${s.accent};font-weight:600;font-size:11px">${s.earning}</span></div>
        <div class="skill-stat"><span class="stat-label">${t.startWith}</span><span style="color:#9CA3AF;font-size:11px">${s.startTool}</span></div>

function goSkill(id){skillId=id;levelIdx=0;lessonIdx=null;renderSkill();}
function goLevel(i){levelIdx=i;lessonIdx=null;renderSkill();}

function renderSkill(){
  const t=T[lang];
  const sk=SKILLS.find(s=>s.id===skillId);
  const isAr=lang==='ar';
  document.getElementById('skill-header').style.background=sk.bg;
  document.getElementById('skill-header').style.borderBottomColor=sk.color+'25';
  document.getElementById('sh-icon').textContent=sk.icon;
  document.getElementById('sh-title').textContent=sk.title[lang];
  document.getElementById('sh-earn').textContent=sk.earning;
  document.getElementById('sh-earn').style.color=sk.accent;
  document.getElementById('s-footer').textContent=t.footer;

  document.getElementById('level-tabs').innerHTML=sk.levels.map((lv,i)=>{
    const l=ls(lv.name[lang]);
    const a=i===levelIdx;
    return `<button class="level-tab" onclick="goLevel(${i})" style="background:${a?l.bg:'transparent'};border-color:${a?l.border:'#1C1C28'};color:${a?l.text:'#4B5563'};font-weight:${a?700:400}">${lv.badge} ${lv.name[lang]}</button>`;
  }).join('');

  const lv=sk.levels[levelIdx];
  const l=ls(lv.name[lang]);
  document.getElementById('level-info').style.background=l.bg;
  document.getElementById('level-info').style.borderColor=l.border+'40';
  document.getElementById('level-info').innerHTML=`
    <div class="level-info-top">
      <span style="font-size:30px">${lv.badge}</span>
      <div><div style="font-size:20px;font-weight:800;color:#fff">${lv.name[lang]}</div><div style="font-size:12px;color:#4B5563">${lv.duration[lang]}</div></div>
      <div class="level-count" style="${isAr?'margin-right:auto':'margin-left:auto'}"><div class="level-count-num" style="color:${l.text}">${lv.lessons.length}</div><div class="level-count-lbl">${t.lessons}</div></div>
    </div>
    <p style="color:#6B7280;font-size:13px;margin:0"><strong style="color:#9CA3AF">${t.goal}:</strong> ${lv.goal[lang]}</p>
  `;

  document.getElementById('lesson-cards').innerHTML=lv.lessons.map((les,i)=>`
    <div class="lesson-card" onclick="goLesson(${i})"
      onmouseenter="this.style.borderColor='${sk.color}66'" onmouseleave="this.style.borderColor='#1C1C28'">
      <span class="lesson-num" style="background:${sk.color}22;border:1px solid ${sk.color}44;color:${sk.accent}">${i+1}</span>
      <div class="lesson-info">
        <div class="lesson-title-text">${les.title[lang]}</div>
        <div class="lesson-meta">${les.steps[lang].length} steps · includes exercise</div>
      </div>
      <span style="color:#374151;font-size:20px;flex-shrink:0;transform:${isAr?'rotate(180deg)':'none'}">→</span>
    </div>
  `).join('');

  let nav='';
  if(levelIdx>0)nav+=`<button class="nav-prev" onclick="goLevel(${levelIdx-1})">${isAr?'→':'←'} ${sk.levels[levelIdx-1].name[lang]}</button>`;
  else nav+=`<button class="nav-prev" onclick="renderAcademy()">${isAr?'→':'←'} ${t.backSkills}</button>`;
  if(levelIdx<sk.levels.length-1)nav+=`<button class="nav-next" style="background:${sk.color}" onclick="goLevel(${levelIdx+1})">${sk.levels[levelIdx+1].name[lang]} ${isAr?'←':'→'}</button>`;
  document.getElementById('level-nav').innerHTML=nav;
  showView('skill-view');
}

// ═══════════════════════
// RENDER LESSON
// ═══════════════════════
function goLesson(i){lessonIdx=i;openStep=null;renderLesson();}
function prevLesson(){lessonIdx--;openStep=null;renderLesson();}
function nextLesson(){lessonIdx++;openStep=null;renderLesson();}
function nextLevel(){levelIdx++;lessonIdx=null;renderSkill();}
function toggleStep(i){openStep=openStep===i?null:i;renderLesson();}

function renderLesson(){
  const t=T[lang];
  const sk=SKILLS.find(s=>s.id===skillId);
  const lv=sk.levels[levelIdx];
  const les=lv.lessons[lessonIdx];
  const l=ls(lv.name[lang]);
  const isAr=lang==='ar';
  const isMobile=window.innerWidth<600;
  const steps=les.steps[lang];
  const layout=les.layout||'top';
  const showLeft=layout==='left'&&!isMobile;
  const showRight=layout==='right'&&!isMobile;

  document.getElementById('lesson-back-btn').textContent=`${isAr?'→':'←'} ${t.back.replace('←','').replace('→','').trim()}`;
  document.getElementById('lesson-back-btn').onclick=()=>renderSkill();
  document.getElementById('lesson-skill-icon').textContent=sk.icon;
  document.getElementById('lesson-skill-name').textContent=sk.title[lang];
  document.getElementById('lesson-level-name').textContent=lv.name[lang];
  document.getElementById('lesson-level-name').style.color=l.text;
  document.getElementById('lesson-counter').textContent=`${t.lesson} ${lessonIdx+1} ${t.of} ${lv.lessons.length}`;
  document.getElementById('lv-footer').textContent=t.footer;

  let imgTop='',imgSide='';
  if(les.image&&(layout==='top'||isMobile)){
    imgTop=`<img class="lesson-img-top" src="${les.image}" alt="${les.title[lang]}" loading="lazy">`;
  }else if(les.image&&(showLeft||showRight)){
    imgSide=`<div class="steps-side-img"><img src="${les.image}" alt="${les.title[lang]}" loading="lazy"></div>`;
  }

  const stepsHTML=steps.map((step,i)=>{
    const isOpen=openStep===i;
    const preview=step.length>80&&!isOpen?step.substring(0,80)+'…':step;
    return `<div class="step-item" style="border-color:${isOpen?sk.color+'60':'#1C1C28'}">
      <button class="step-btn" onclick="toggleStep(${i})">
        <span class="step-num" style="${isOpen?'background:'+sk.color+';color:#fff':''}">${i+1}</span>
        <span class="step-text" style="color:${isOpen?'#fff':'#9CA3AF'};font-weight:${isOpen?600:400};text-align:${isAr?'right':'left'}">${preview}</span>
        <span class="step-toggle">${isOpen?'▲':'▼'}</span>
      </button>
      ${isOpen?`<div class="step-expanded" style="display:block;padding:${isAr?'0 52px 16px 16px':'0 16px 16px 52px'}">${step}</div>`:''}
    </div>`;
  }).join('');

  let stepsWrap='';
  if(showLeft)stepsWrap=`<div class="steps-with-img">${imgSide}<div class="steps-list">${stepsHTML}</div></div>`;
  else if(showRight)stepsWrap=`<div class="steps-with-img" style="flex-direction:row-reverse">${imgSide}<div class="steps-list">${stepsHTML}</div></div>`;
  else stepsWrap=`<div class="steps-list">${stepsHTML}</div>`;

  const hasPrev=lessonIdx>0;
  const hasNext=lessonIdx<lv.lessons.length-1;
  const hasNextLv=levelIdx<sk.levels.length-1;
  let prevBtn=hasPrev
    ?`<button class="lesson-nav-prev" onclick="prevLesson()">${isAr?'→':'←'} ${t.prevLesson.replace(/[←→]/g,'').trim()}</button>`
    :`<button class="lesson-nav-prev" onclick="renderSkill()">${isAr?'→':'←'} ${t.back.replace(/[←→]/g,'').trim()}</button>`;
  let nextBtn=hasNext
    ?`<button class="lesson-nav-next" style="background:${sk.color}" onclick="nextLesson()">${t.nextLesson.replace(/[←→]/g,'').trim()} ${isAr?'←':'→'}</button>`
    :hasNextLv
    ?`<button class="lesson-nav-next" style="background:${sk.color}" onclick="nextLevel()">${t.nextLevel}: ${sk.levels[levelIdx+1].name[lang]} ${isAr?'←':'→'}</button>`
    :`<div class="lesson-complete" style="color:${sk.accent};border-color:${sk.color}50">${t.complete}</div>`;

  document.getElementById('lesson-body').innerHTML=`
    <div style="margin-bottom:20px">
      <span style="background:${l.bg};border:1px solid ${l.border};color:${l.text};border-radius:8px;padding:4px 12px;font-size:12px;font-weight:600">${l.badge} ${lv.name[lang]}</span>
      <span style="font-size:12px;color:#374151;margin-left:8px">${t.lesson} ${lessonIdx+1}</span>
    </div>
    <h1 style="font-size:clamp(20px,4vw,28px);font-weight:800;color:#fff;margin:0 0 24px;line-height:1.25">${les.title[lang]}</h1>
    ${imgTop}
    <div style="margin-bottom:28px">
      <div class="steps-header"><div class="steps-bar" style="background:${sk.color}"></div><span class="steps-label">${t.howTo}</span></div>
      ${stepsWrap}
    </div>
    <div class="method-box" style="background:#0A0E18;border-color:${sk.color}30">
      <div class="box-header"><span class="box-emoji">🧠</span><span class="box-label" style="color:${sk.accent}">${t.bestWay}</span></div>
      <p class="box-text" style="color:#9CA3AF">${les.method[lang]}</p>
    </div>
    <div class="method-box" style="background:#0E0A00;border-color:#92400E40">
      <div class="box-header"><span class="box-emoji">💪</span><span class="box-label" style="color:#FCD34D">${t.exercise}</span></div>
      <p class="box-text" style="color:#D97706">${les.exercise[lang]}</p>
    </div>
    ${les.tip?`<div class="tip-box"><p style="color:#6B7280;font-size:13px;line-height:1.65;margin:0">${les.tip[lang]}</p></div>`:''}
    <div class="lesson-nav">${prevBtn}${nextBtn}</div>
  `;
  showView('lesson-view');
}

// ═══════════════════════
// INIT
// ═══════════════════════
(function(){
  document.documentElement.lang=lang;
  document.documentElement.dir=lang==='ar'?'rtl':'ltr';
  document.querySelectorAll('.lang-btn').forEach(b=>{
    const lbl=b.textContent.trim();
    b.classList.toggle('active',(lang==='fr'&&lbl==='FR')||(lang==='ar'&&lbl==='ع')||(lang==='en'&&lbl==='EN'));
  });
  if(hasAccess)renderAcademy();
  else renderLanding();
})();
</script>
</body>
</html>
