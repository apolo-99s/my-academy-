.skill-card{border-radius:16px;padding:26px;cursor:pointer;transition:all 0.2s;border:2px solid transparent}
.skill-card:hover{transform:translateY(-3px)}

.skill-sub{font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}

.stat-label{color:#4B5563}

.includes-box{background:#0D0D14;border:1px solid #1C1C28;border-radius:14px;padding:22px 24px;margin-bottom:28px}

.include-check{color:#7C3AED;font-size:14px;flex-shrink:0}

.lesson-nav-next{border:none;border-radius:10px;padding:12px 20px;color:#fff;font-size:13px;font-weight:700}

        ar: ['روح لـ canva.com أو حمّل التطبيق من Google Play أو App Store — مجاني تماماً.','اضغط على "سجّل" وأنشئ حساب بإيميلك أو عبر Google، ياخذ 30 ثانية فقط.','بعد الدخول، اضغط على "إنشاء تصميم" في أعلى يمين لوحة التحكم.','اختار "منشور Instagram مربع" — راح يكون عندك مساحة فارغة 1080x1080 بكسل، مثالية للبداية.','على اليسار عندك اللوحة الرئيسية: قوالب (آلاف النماذج)، عناصر (أشكال وأيقونات)، نص، خلفية، وملفاتك المحمّلة.','في الأعلى، شريط الأدوات يسمح لك بتغيير الخط، الحجم، اللون وموضع العناصر.','استخدم Ctrl+Z للتراجع و Ctrl+D للنسخ — هالاختصارات توفر وقتك بزاف.','للتصدير: اضغط على "مشاركة" → "تحميل" → اختار PNG (للتواصل الاجتماعي) أو PDF (للطباعة).'],
        en: ['Go to canva.com or download the app from Google Play or App Store — it\'s completely free.','Click "Sign Up" and create an account with your email or via Google, it takes 30 seconds.','Once logged in, click "Create a design" at the top right of the dashboard.','Choose "Instagram Post Square" — you\'ll have a blank 1080x1080px canvas, perfect to start.','On the left, you have the main panel: Templates (thousands of models), Elements (shapes, icons), Text, Background, and your Uploads.','At the top, the toolbar lets you change font, size, color and position of your elements.','Use Ctrl+Z to undo and Ctrl+D to duplicate — these shortcuts will save you a lot of time.','To export: click "Share" → "Download" → choose PNG (for social media) or PDF (for printing).']
      },
      method: { fr: 'Ouvrez Canva maintenant et passez 20 minutes à cliquer sur chaque bouton. Ne concevez rien — explorez juste. Cette session est votre vraie leçon.', ar: 'افتح Canva الآن واقضِ 20 دقيقة تضغط على كل زر. ما تصمّمش شيء — بس استكشف. هالجلسة هي درسك الحقيقي.', en: 'Open Canva now and spend 20 minutes clicking every button. Do not design anything — just explore. This session is your real lesson.' },
      exercise: { fr: 'Créez un post Instagram avec votre nom en grand texte gras et un fond coloré. Téléchargez-le et envoyez-le à votre formateur.', ar: 'أنشئ منشور Instagram باسمك بخط كبير وعريض وخلفية ملونة. حمّله وأرسله للمدرب.', en: 'Create an Instagram post with your name in big bold text and a colored background. Download it and send it to your trainer.' },
      tip: { fr: '💡 Canva Gratuit vous donne accès à plus de 250 000 templates. Ne passez pas à la version Pro avant d\'avoir vos premiers clients payants.', ar: '💡 Canva المجاني يعطيك أكثر من 250,000 قالب. ما تنتقلش للـ Pro قبل ما تجيك أول زبون.', en: '💡 Canva Free gives you access to over 250,000 templates. Don\'t upgrade to Pro until you have your first paying clients.' }
    }, {
      id: 'd-b-2',
      title: { fr: 'Les 4 Règles d\'Or du Design (CARP)', ar: 'قواعد التصميم الأربعة الذهبية (CARP)', en: 'The 4 Golden Rules of Design (CARP)' },
      image: 'https://images.unsplash.com/photo-1561070791-2526d30994b5?w=800&q=80',
      layout: 'right',
      steps: {
        fr: ['CONTRASTE: Rendez l\'élément le plus important le plus grand, plus coloré ou plus différent du reste. Le contraste attire l\'œil et crée une hiérarchie visuelle.','ALIGNEMENT: Rien ne doit être placé au hasard. Activez les guides (Vue → Afficher les règles) pour aligner parfaitement vos éléments.','RÉPÉTITION: Utilisez la même police, les mêmes couleurs et le même style pour les éléments similaires. Cela crée une cohérence professionnelle.','PROXIMITÉ: Groupez les éléments qui vont ensemble et séparez ceux qui n\'ont pas de lien. L\'espacement crée la clarté.','Astuce pro: Ouvrez n\'importe quel template Canva et identifiez ces 4 règles dans chaque élément. Vous verrez qu\'elles sont toutes respectées.','Exercice: Cherchez "flyer restaurant algérie" sur Google. Identifiez quelles règles sont respectées et lesquelles sont brisées.'],
        ar: ['التباين: خلّي العنصر الأهم أكبر، أو أكثر لوناً، أو مختلفاً عن الباقي. التباين يجذب العين ويخلق تسلسلاً بصرياً.','المحاذاة: ما كاين والو موضوع بالعشوائية. فعّل الخطوط (عرض → أظهر الخطوط) باش تراصف عناصرك بالضبط.','التكرار: استخدم نفس الخط، نفس الألوان ونفس الستايل للعناصر المتشابهة. هذا يخلق انسجاماً احترافياً.','القرب: جمّع العناصر اللي تمشي مع بعض وفرّق اللي ما عندهمش رابط. التباعد يخلق الوضوح.','نصيحة: افتح أي قالب Canva وحدّد هالقواعد الأربعة في كل عنصر. راح تشوف أنهم كلهم مطبقين.','تمرين: دور على "flyer مطعم الجزائر" في Google. حدّد القواعد المطبقة والمكسورة.'],
        en: ['CONTRAST: Make the most important element bigger, more colorful, or different from the rest. Contrast attracts the eye and creates visual hierarchy.','ALIGNMENT: Nothing should be placed randomly. Enable guides (View → Show Rulers) to align your elements perfectly.','REPETITION: Use the same font, colors and style for similar elements. This creates professional consistency.','PROXIMITY: Group elements that belong together and separate those that don\'t. Spacing creates clarity.','Pro tip: Open any Canva template and identify these 4 rules in every element. You\'ll see they\'re all respected.','Exercise: Search "flyer restaurant algeria" on Google. Identify which rules are followed and which are broken.']
      },
      method: { fr: 'Créez deux versions d\'un même design: une où vous violez délibérément les 4 règles, et une où vous les respectez parfaitement. La comparaison rend les règles inoubliables.', ar: 'أنشئ نسختين من نفس التصميم: وحدة تكسر فيها القواعد الأربعة، ووحدة تتبعها بالضبط. المقارنة تخلّيك ما تنساش القواعد.', en: 'Create two versions of the same design: one where you deliberately break all 4 rules, and one where you follow them perfectly. The comparison makes the rules unforgettable.' },
      exercise: { fr: 'Designez une carte de visite pour un restaurant algérien (El Baraka) DEUX fois: Version 1 = violez les 4 règles. Version 2 = respectez-les parfaitement. Comparez les deux.', ar: 'صمّم بطاقة أعمال لمطعم جزائري (البركة) مرتين: نسخة 1 = اكسر القواعد الأربعة. نسخة 2 = اتبعها بالضبط. قارن بينهما.', en: 'Design a business card for an Algerian restaurant (El Baraka) TWICE: Version 1 = violate all 4 rules. Version 2 = follow them perfectly. Compare both.' },
      tip: { fr: '💡 Les designers professionnels ne brisent les règles qu\'APRÈS les avoir parfaitement maîtrisées. C\'est la différence entre un amateur et un pro.', ar: '💡 المصممون المحترفين ما يكسرونش القواعد إلا بعد ما يتقنوها بالكامل. هذا هو الفرق بين الهاوي والمحترف.', en: '💡 Professional designers only break rules AFTER perfectly mastering them. That\'s the difference between an amateur and a pro.' }
    }]

    name: { fr: 'Intermédiaire', ar: 'متوسط', en: 'Intermediate' },
    badge: '⚡',
    duration: { fr: 'Semaines 5–10', ar: 'الأسابيع 5–10', en: 'Weeks 5–10' },
    goal: { fr: 'Passer de Canva à Photoshop et construire vos premiers projets clients', ar: 'الانتقال من Canva إلى Photoshop وبناء أول مشاريعك للزبائن', en: 'Move from Canva to Photoshop and build your first client projects' },
    lessons: [{
      id: 'd-i-1',
      title: { fr: 'Photopea — L\'alternative gratuite à Photoshop', ar: 'Photopea — البديل المجاني لـ Photoshop', en: 'Photopea — The free alternative to Photoshop' },
      image: 'https://images.unsplash.com/photo-1572044162444-ad60f128bdea?w=800&q=80',
      layout: 'left',
      steps: {
        fr: ['Photopea (photopea.com) fonctionne directement dans votre navigateur et est identique à Photoshop à 99% — totalement gratuit.','L\'interface: à gauche vous avez la barre d\'outils (sélection, pinceau, texte, etc.). À droite, le panneau des calques. En haut, les options contextuelles.','Les CALQUES sont comme des feuilles transparentes superposées. Chaque élément (texte, image, forme) doit être sur son propre calque pour pouvoir le modifier indépendamment.','Pour ouvrir une photo: Fichier → Ouvrir. Double-cliquez sur le calque "Arrière-plan" et cliquez OK pour le déverrouiller.','Pour supprimer un fond: utilisez l\'outil Baguette magique, cliquez sur le fond, puis appuyez sur Delete. Pour les fonds complexes: Sélection → Sujet.','Pour ajouter du texte: sélectionnez l\'outil T, cliquez sur le canvas, tapez votre texte, puis modifiez police, taille et couleur.','Pour exporter: Fichier → Exporter → Exporter sous → PNG (en cochant Transparence) ou JPEG.'],
        ar: ['Photopea (photopea.com) يشتغل مباشرة في المتصفح وهو مطابق لـ Photoshop بنسبة 99% — مجاني تماماً.','الواجهة: على اليسار عندك شريط الأدوات (تحديد، فرشاة، نص...). على اليمين، لوحة الطبقات. في الأعلى، الخيارات السياقية.','الطبقات هي أوراق شفافة مكدسة. كل عنصر (نص، صورة، شكل) لازم يكون على طبقته الخاصة باش تقدر تعدله بشكل مستقل.','لفتح صورة: ملف → فتح. انقر مرتين على طبقة "الخلفية" واضغط OK باش تفتحها.','لحذف الخلفية: استخدم أداة العصا السحرية، انقر على الخلفية، ثم اضغط Delete. للخلفيات المعقدة: تحديد → الموضوع.','لإضافة نص: اختر أداة T، انقر على المساحة، اكتب نصك، ثم غيّر الخط، الحجم واللون.','للتصدير: ملف → تصدير → تصدير كـ → PNG (فعّل الشفافية) أو JPEG.'],
        en: ['Photopea (photopea.com) runs directly in your browser and is 99% identical to Photoshop — completely free.','Interface: on the left you have the toolbar (selection, brush, text, etc.). On the right, the layers panel. At the top, contextual options.','LAYERS are like transparent sheets stacked on top of each other. Each element (text, image, shape) must be on its own layer to edit it independently.','To open a photo: File → Open. Double-click on the "Background" layer and click OK to unlock it.','To remove a background: use the Magic Wand tool, click on the background, then press Delete. For complex backgrounds: Select → Subject.','To add text: select the T tool, click on the canvas, type your text, then change font, size and color.','To export: File → Export → Export As → PNG (check Transparency) or JPEG.']
      },
      method: { fr: 'Ouvrez une photo de produit dans Photopea, supprimez l\'arrière-plan, ajoutez un fond coloré et du texte (nom du produit + prix). C\'est une simulation parfaite d\'une publicité professionnelle.', ar: 'افتح صورة منتج في Photopea، ازل الخلفية، زيد خلفية ملونة ونص (اسم المنتج + السعر). هذي محاكاة مثالية لإعلان احترافي.', en: 'Open a product photo in Photopea, remove the background, add a colored background and text (product name + price). This is a perfect simulation of a professional ad.' },
      exercise: { fr: 'Prenez une photo d\'un produit algérien (ex: café, huile d\'olive, miel). Supprimez le fond dans Photopea, placez-le sur fond blanc, ajoutez le prix et le nom. Exportez en PNG.', ar: 'اخذ صورة منتج جزائري (مثلاً: قهوة، زيت زيتون، عسل). ازل الخلفية في Photopea، حطها على خلفية بيضاء، زيد السعر والاسم. صدّر PNG.', en: 'Take a photo of an Algerian product (e.g.: coffee, olive oil, honey). Remove the background in Photopea, place it on a white background, add price and name. Export as PNG.' },
      tip: { fr: '💡 Pour ajouter une ombre: clic droit sur le calque → Options de fusion → Ombre portée → opacité 40%, distance 10px, flou 20px. Le résultat est immédiatement professionnel.', ar: '💡 لإضافة ظل: انقر يمين على الطبقة → خيارات المزج → ظل مسقط → شفافية 40%، مسافة 10px، تعتيم 20px. النتيجة تكون احترافية مباشرة.', en: '💡 To add a shadow: right-click on the layer → Blending Options → Drop Shadow → opacity 40%, distance 10px, blur 20px. The result is instantly professional.' }
    }]
  }]

      layout: 'top',
      steps: {
        fr: ['Instagram: Allez dans votre Profil → les 3 lignes en haut à droite → Paramètres → Compte → "Passer en compte professionnel" → choisissez "Business".','Facebook: Rendez-vous sur facebook.com/pages/create → sélectionnez "Entreprise" → donnez un nom et une catégorie à votre page.','Meta Business Suite: Connectez-vous sur business.facebook.com → connectez votre Page Facebook et votre compte Instagram.','WhatsApp Business: Téléchargez l\'application, utilisez un numéro professionnel et liez-le à votre compte Facebook. Indispensable en Algérie.','Profil 100%: Ajoutez une photo professionnelle, une bio de 80 caractères max, un lien bio (linktr.ee est gratuit) et activez le bouton "Contacter".','Créez un dossier "Contenu Client" sur votre ordinateur avec: Photos, Vidéos, Légendes prêtes à l\'emploi.'],
        ar: ['Instagram: روح للبروفيل → 3 خطوط في الأعلى → إعدادات → حساب → "تحويل لحساب محترف" → اختار "Business".','Facebook: روح لـ facebook.com/pages/create → اختار "مشروع" → سمّي صفحتك وحدّد الفئة.','Meta Business Suite: سجل دخول على business.facebook.com → اربط صفحة Facebook وحساب Instagram.','WhatsApp Business: حمّل التطبيق، استخدم رقم احترافي واربطه بحساب Facebook. ضروري في الجزائر.','بروفيل 100%: زيد صورة احترافية، bio 80 حرف كحد أقصى، رابط bio (linktr.ee مجاني) وفعّل زر "تواصل".','أنشئ مجلد "محتوى الزبون" على كمبيوتريك فيه: صور، فيديوهات، تعليقات جاهزة.'],
        en: ['Instagram: Go to your Profile → the 3 lines → Settings → Account → "Switch to Professional Account" → choose "Business".','Facebook: Go to facebook.com/pages/create → select "Business" → name your page and choose a category.','Meta Business Suite: Log in to business.facebook.com → connect your Facebook Page and Instagram account.','WhatsApp Business: Download the app, use a professional number and link it to your Facebook account. Essential in Algeria.','100% Profile: Add a professional photo, a bio of 80 characters max, a bio link (linktr.ee is free) and activate the "Contact" button.','Create a "Client Content" folder on your computer with: Photos, Videos, Ready-to-use Captions.']

      method: { fr: 'Créez un compte Instagram test avec une nouvelle adresse email. Appelez-le "DZFoodTest" — ce sera votre bac à sable pour tester toutes vos stratégies.', ar: 'أنشئ حساب Instagram تجريبي بإيميل جديد. سمّيه "DZFoodTest" — هذا صندوق الرمل الخاص بك لتجربة كل الاستراتيجيات.', en: 'Create a test Instagram account with a new email address. Call it "DZFoodTest" — this will be your sandbox to test all your strategies.' },
      exercise: { fr: 'Configurez un profil business complet pour un restaurant fictif sur Instagram ET Facebook. Connectez les deux comptes à Meta Business Suite. Capturez d\'écran pour preuve.', ar: 'اعدد بروفيل business كامل لمطعم وهمي على Instagram وFacebook. اربط الحسابين بـ Meta Business Suite. خذ لقطة شاشة كدليل.', en: 'Set up a complete business profile for a fictional restaurant on Instagram AND Facebook. Connect both accounts to Meta Business Suite. Screenshot as proof.' },
      tip: { fr: '💡 Utilisez linktr.ee pour créer une page de destination gratuite avec plusieurs boutons: WhatsApp, Facebook, Menu, Localisation. C\'est la solution la plus professionnelle en Algérie.', ar: '💡 استخدم linktr.ee باش تصنع صفحة هبوط مجانية بعدة أزرار: WhatsApp، Facebook، القائمة، الموقع. هذا أحسن حل احترافي في الجزائر.', en: '💡 Use linktr.ee to create a free landing page with multiple buttons: WhatsApp, Facebook, Menu, Location. This is the most professional solution in Algeria.' }
    }, {
      id: 's-b-2',
      title: { fr: 'Comprendre et Dompter l\'Algorithme Instagram', ar: 'تفهم والسيطرة على خوارزمية Instagram', en: 'Understand and Master the Instagram Algorithm' },
      image: 'https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=800&q=80',
      layout: 'right',
      steps: {
        fr: ['L\'algorithme a un seul objectif: garder les gens le plus longtemps possible sur l\'application. Il montre donc le contenu qui génère le plus d\'engagement.','Les 5 signaux les plus importants: 1. SAUVEGARDES (le plus puissant), 2. PARTAGES, 3. COMMENTAIRES de +10 mots, 4. LIKES, 5. TEMPS DE VISIONNAGE.','Pour augmenter les sauvegardes: terminez chaque post éducatif par "Sauvegardez ce post pour le retrouver plus tard".','Pour booster les commentaires: posez une question spécifique en fin de légende. Ex: "Entre tajine et couscous, quel est votre plat préféré ce weekend?"','Analysez vos Insights: chaque post → "Voir les insights" → vous verrez: comptes touchés, impressions, interactions.','Les meilleures heures de publication en Algérie: 12h-13h30, 18h-20h, 21h-23h. Testez ces créneaux.'],
        ar: ['الخوارزمية عندها هدف واحد: تخلّي الناس أطول وقت ممكن على التطبيق. لذلك تعرض المحتوى اللي يولد أكبر تفاعل.','أقوى 5 إشارات: 1. الحفظ (الأقوى)، 2. المشاركة، 3. التعليقات +10 كلمات، 4. الإعجابات، 5. وقت المشاهدة.','باش تزيد الحفظ: اختم كل منشور تعليمي بـ "احفظ هذا المنشور باش ترجعله وقت الحاجة".','باش تزيد التعليقات: اطرح سؤال محدد في نهاية التعليق. مثال: "بين الطاجين والكسكس، شنو هو طبقك المفضل هذا الويكند؟"','حلّل Insights: كل منشور → "عرض الإحصائيات" → راح تشوف: الحسابات الموصلة، مرات الظهور، التفاعلات.','أفضل أوقات النشر في الجزائر: 12-13:30، 18-20، 21-23. جرب هالمواعيد.'],
        en: ['The algorithm has one goal: keep people on the app as long as possible. So it shows content that generates the most engagement.','The 5 most important signals: 1. SAVES (the strongest), 2. SHARES, 3. COMMENTS of +10 words, 4. LIKES, 5. WATCH TIME.','To increase saves: end every educational post with "Save this post to find it later".','To boost comments: ask a specific question at the end of the caption. Ex: "Between tajine and couscous, what\'s your favorite dish this weekend?"','Analyze your Insights: each post → "View Insights" → you\'ll see: accounts reached, impressions, interactions.','Best posting times in Algeria: 12pm-1:30pm, 6pm-8pm, 9pm-11pm. Test these time slots.']
      },
      method: { fr: 'Pendant 20 minutes, regardez consciemment les Reels. Chaque Reel qui vous retient plus de 5 secondes: mettez en pause. Notez: Quel était l\'accroche? Quelle émotion a été utilisée?', ar: 'لمدة 20 دقيقة، شاهد Reels بوعي. كل Reel يبقيك أكثر من 5 ثوانٍ: وقّف. دوّن: شو كانت الجذبة؟ شو المشاعر المستخدمة؟', en: 'For 20 minutes, consciously watch Reels. Every Reel that keeps you for more than 5 seconds: pause. Note: What was the hook? What emotion was used?' },
      exercise: { fr: 'Publiez 3 posts différents sur votre compte test: Post 1 = photo sans CTA. Post 2 = carrousel + "Sauvegardez ce post". Post 3 = photo + question. Comparez les Insights après 48h.', ar: 'انشر 3 منشورات مختلفة على حسابك التجريبي: منشور 1 = صورة بدون CTA. منشور 2 = كاروسيل + "احفظ هذا المنشور". منشور 3 = صورة + سؤال. قارن Insights بعد 48 ساعة.', en: 'Post 3 different posts on your test account: Post 1 = photo without CTA. Post 2 = carousel + "Save this post". Post 3 = photo + question. Compare Insights after 48h.' },
      tip: { fr: '💡 Instagram pénalise sévèrement les posts qui contiennent des liens externes dans la LÉGENDE. Dites toujours "lien en bio" ou "lien dans ma bio".', ar: '💡 Instagram يعاقب بشدة المنشورات اللي فيها روابط خارجية في التعليق. دائماً قول "الرابط في البروفيل" أو "الرابط في البايو".', en: '💡 Instagram severely penalizes posts that contain external links in the CAPTION. Always say "link in bio" or "link in my bio".' }
    }]
  }]

      image: 'https://images.unsplash.com/photo-1574717024653-61fd2cf4d44d?w=800&q=80',
      layout: 'top',
      steps: {
        fr: ['Téléchargez CapCut depuis Google Play ou App Store — c\'est totalement gratuit et sans filigrane.','Ouvrez l\'application → cliquez sur le + → sélectionnez vos vidéos et photos → Ajouter. Vous êtes maintenant sur la timeline.','La timeline est votre espace de travail: chaque clip est un bloc. Tapez sur un clip pour le sélectionner. En bas: Split (couper), Delete (supprimer), Speed (vitesse).','Pour couper: faites glisser la ligne blanche jusqu\'à l\'endroit où vous voulez couper → Split → Delete la partie inutile.','Pour ajouter de la musique: Audio → Sons → recherchez une musique → +. Réglez le volume à 30% si vous avez du dialogue pour ne pas couvrir les voix.','Pour ajouter du texte: Texte → Ajouter → tapez votre texte → choisissez police, couleur, taille. Faites glisser pour le positionner.','Pour exporter: flèche en haut à droite → 1080p et 30fps → exportez. La qualité est parfaite pour Instagram et YouTube.'],
        ar: ['حمّل CapCut من Google Play أو App Store — مجاني تماماً وبدون علامة مائية.','افتح التطبيق → اضغط على + → اختار فيديوهاتك وصورك → أضف. أنت الآن على الجدول الزمني.','الجدول الزمني هو مساحة عملك: كل كليب هو بلوك. اضغط على كليب لتحديده. في الأسفل: Split (قطع)، Delete (حذف)، Speed (سرعة).','للقطع: اسحب الخط الأبيض للمكان اللي تحب تقطع فيه → Split → Delete الجزء الغير مرغوب.','لإضافة موسيقى: Audio → Sounds → ابحث عن أغنية → +. خفّض الصوت لـ30% إذا كان عندك حوار باش ما يغطيش الأصوات.','لإضافة نص: نص → أضف → اكتب نصك → اختار الخط، اللون، الحجم. اسحب باش تموضعه.','للتصدير: السهم في أعلى يمين → 1080p و30fps → صدّر. الجودة ممتازة لـ Instagram وYouTube.'],
        en: ['Download CapCut from Google Play or App Store — completely free and without watermark.','Open the app → click on + → select your videos and photos → Add. You\'re now on the timeline.','The timeline is your workspace: each clip is a block. Tap on a clip to select it. At the bottom: Split, Delete, Speed.','To cut: drag the white line to where you want to cut → Split → Delete the unwanted part.','To add music: Audio → Sounds → search for a track → +. Lower the volume to 30% if you have dialogue so it doesn\'t cover voices.','To add text: Text → Add → type your text → choose font, color, size. Drag to position.','To export: arrow at top right → 1080p and 30fps → export. Quality is perfect for Instagram and YouTube.']
      },
      method: { fr: 'Filmez 10 courts clips de n\'importe quoi (objet, paysage, vous-même). Importez dans CapCut. Gardez seulement les 3 meilleures secondes de chaque clip. Ajoutez une musique. Exportez. Regardez et notez ce qui vous semble étrange.', ar: 'صوّر 10 كليبات قصيرة من أي شيء (شيء، منظر طبيعي، نفسك). استوردها في CapCut. احتفظ بأحسن 3 ثوانٍ من كل كليب. زيد موسيقى. صدّر. شاهد ولاحظ اللي يبدو غريب.', en: 'Film 10 short clips of anything (object, landscape, yourself). Import into CapCut. Keep only the best 3 seconds of each clip. Add music. Export. Watch and note what seems off.' },
      exercise: { fr: 'Créez une vidéo de 60 secondes qui raconte votre journée: minimum 8 clips différents, une musique de fond, votre nom en texte au début, et un titre à la fin. Exportez et partagez.', ar: 'أنشئ فيديو 60 ثانية يحكي يومك: 8 كليبات مختلفة على الأقل، موسيقى خلفية، اسمك كنص في البداية، وعنوان في النهاية. صدّره وشاركه.', en: 'Create a 60-second video telling your day: minimum 8 different clips, background music, your name as text at the start, and a title at the end. Export and share.' },
      tip: { fr: '💡 L\'erreur la plus commune des débutants: des clips trop longs. Chaque clip devrait durer entre 1.5 et 4 secondes maximum. Un montage rapide semble toujours plus professionnel et dynamique.', ar: '💡 أكثر خطأ شائع عند المبتدئين: كليبات طويلة جداً. كل كليب لازم يكون بين 1.5 و4 ثوانٍ كحد أقصى. المونتاج السريع دائماً يبان أكثر احترافية وحيوية.', en: '💡 The most common mistake for beginners: clips that are too long. Each clip should be between 1.5 and 4 seconds max. Fast-paced editing always looks more professional and dynamic.' }

  tagline: { fr: 'Créez des sites web professionnels qui génèrent des revenus', ar: 'أنشئ مواقع ويب احترافية تدرّ عليك', en: 'Build professional websites that generate income' },
  levels: [{
    name: { fr: 'Débutant', ar: 'مبتدئ', en: 'Beginner' },
    badge: '🌱',
    duration: { fr: 'Semaines 1–4', ar: 'الأسابيع 1–4', en: 'Weeks 1–4' },
    goal: { fr: 'Comprendre le HTML, CSS et créer votre première page web', ar: 'تفهم HTML و CSS وتصنع أول صفحة ويب', en: 'Understand HTML & CSS and create your first web page' },
    lessons: [{
      id: 'w-b-1',
      title: { fr: 'HTML - La structure de base de tout site web', ar: 'HTML - هيكل أساسي لكل موقع ويب', en: 'HTML - The basic structure of every website' },
      image: 'https://images.unsplash.com/photo-1547658719-da2b51169166?w=800&q=80',
      layout: 'top',
      steps: {
        fr: ['Ouvrez VS Code (ou tout autre éditeur de code) → Fichier → Nouveau fichier → index.html.','Tapez le point d\'exclamation (!) et appuyez sur Tab — cela génère automatiquement la structure HTML de base.','DOCTYPE html déclare que c\'est un document HTML5. <html> est la racine. <head> contient les métadonnées (titre, encodage, etc.).','Le <body> contient tout ce qui s\'affiche sur la page: textes, images, liens, boutons.','Les titres: <h1> à <h6> — <h1> est le plus important, <h6> le moins important. Utilisez <h1> pour le titre principal.','Les paragraphes: <p> pour le texte normal. Les liens: <a href="https://google.com">Google</a> pour créer des liens. Les images: <img src="photo.jpg" alt="description">.','Les div: <div> sont des conteneurs qui permettent de structurer la page. Les sections: <section>, <main>, <header>, <footer> pour une organisation claire.'],
        ar: ['افتح VS Code (أو أي محرر كود) → ملف → ملف جديد → index.html.','اكتب علامة التعجب (!) واضغط Tab — هذا يولّد هيكل HTML الأساسي تلقائياً.','DOCTYPE html تصريح بأنها صفحة HTML5. <html> هو الجذر. <head> يحتوي البيانات الوصفية (العنوان، الترميز، الخ.).','<body> يحتوي كل ما يظهر على الصفحة: نصوص، صور، روابط، أزرار.','العناوين: <h1> إلى <h6> — <h1> هو الأهم، <h6> الأقل أهمية. استخدم <h1> للعنوان الرئيسي.','الفقرات: <p> للنص العادي. الروابط: <a href="https://google.com">Google</a> لإنشاء روابط. الصور: <img src="photo.jpg" alt="وصف">.','الـ div: <div> هي حاويات تسمح بتنظيم الصفحة. الأقسام: <section>، <main>، <header>، <footer> لتنظيم واضح.'],
        en: ['Open VS Code (or any code editor) → File → New File → index.html.','Type the exclamation mark (!) and press Tab — this automatically generates the basic HTML structure.','DOCTYPE html declares it\'s an HTML5 document. <html> is the root. <head> contains metadata (title, encoding, etc.).','The <body> contains everything displayed on the page: text, images, links, buttons.','Headings: <h1> to <h6> — <h1> is the most important, <h6> the least. Use <h1> for the main title.','Paragraphs: <p> for normal text. Links: <a href="https://google.com">Google</a> to create links. Images: <img src="photo.jpg" alt="description">.','The div: <div> are containers that structure the page. Sections: <section>, <main>, <header>, <footer> for clear organization.']
      },
      method: { fr: 'Créez 5 pages HTML différentes: index.html, about.html, contact.html, services.html, blog.html. Ouvrez-les dans le navigateur pour voir la différence. Comprenez comment chaque balise s\'affiche.', ar: 'أنشئ 5 صفحات HTML مختلفة: index.html، about.html، contact.html، services.html، blog.html. افتحهم في المتصفح باش تشوف الفرق. افهم كيف تظهر كل وسومة.', en: 'Create 5 different HTML pages: index.html, about.html, contact.html, services.html, blog.html. Open them in the browser to see the difference. Understand how each tag displays.' },
      exercise: { fr: 'Créez une page "À propos de moi" complète avec: 1 titre principal (<h1>), 1 sous-titre (<h2>), 1 paragraphe vous présentant, 1 image de vous, et 1 lien vers Google. Exportez et ouvrez dans le navigateur.', ar: 'أنشئ صفحة "عني" كاملة بها: عنوان رئيسي (<h1>)، عنوان فرعي (<h2>)، فقرة تعرفك، صورة لك، ورابط إلى Google. صدّر وافتح في المتصفح.', en: 'Create a complete "About Me" page with: 1 main heading (<h1>), 1 subheading (<h2>), 1 paragraph introducing yourself, 1 picture of yourself, and 1 link to Google. Export and open in browser.' },
      tip: { fr: '💡 Utilisez Emmet pour générer du HTML plus rapidement. Exemple: tapez "div.container>p*3" et appuyez sur Tab — cela génère une div avec une classe "container" et 3 paragraphes.', ar: '💡 استخدم Emmet لتوليد HTML أسرع. مثال: اكتب "div.container>p*3" واضغط Tab — هذا يولّد div مع كلاس "container" و3 فقرات.', en: '💡 Use Emmet to generate HTML faster. Example: type "div.container>p*3" and press Tab — this generates a div with class "container" and 3 paragraphs.' }
    }, {
      id: 'w-b-2',
      title: { fr: 'CSS - Le style qui rend votre site magnifique', ar: 'CSS - التصميم اللي يخلّي موقعك جميل', en: 'CSS - The style that makes your site beautiful' },
      image: 'https://images.unsplash.com/photo-1507721999472-8ed4421c4af2?w=800&q=80',
      layout: 'right',
      steps: {
        fr: ['CSS (Cascading Style Sheets) est le langage qui donne du style à votre HTML. Créez un fichier style.css et liez-le à votre HTML avec: <link rel="stylesheet" href="style.css">.','Les sélecteurs: h1 { color: blue; } — cela rend tous les titres <h1> bleus. Vous pouvez sélectionner par balise, classe ou ID.','Les classes: .ma-classe { background: red; } — utilisez class="ma-classe" dans votre HTML pour appliquer le style.','Les propriétés essentielles: color (couleur du texte), background-color (fond), font-size (taille), margin (marge extérieure), padding (marge intérieure), border (bordure).','Le modèle de boîte: margin = espace hors de la boîte, padding = espace à l\'intérieur, border = contour.','Flexbox: display:flex + justify-content + align-items permet de disposer les éléments flexiblement — c\'est LA méthode moderne.'],
        ar: ['CSS هو اللغة اللي تعطي ستايل لـ HTML. أنشئ ملف style.css واربطه بـ HTML بـ: <link rel="stylesheet" href="style.css">.','المحددات: h1 { color: blue; } — هذا يخلّي كل عناوين <h1> زرقاء. تقدر تحدد بالوسومة، الكلاس أو الـ ID.','الكلاسات: .ma-classe { background: red; } — استخدم class="ma-classe" في HTML باش تطبق الستايل.','الخصائص الأساسية: color (لون النص)، background-color (الخلفية)، font-size (الحجم)، margin (الهامش الخارجي)، padding (الهامش الداخلي)، border (الحدود).','نموذج المربع: margin = المساحة خارج المربع، padding = المساحة داخل المربع، border = الحدود.','Flexbox: display:flex + justify-content + align-items تخلّيك ترتب العناصر بمرونة — هذي الطريقة العصرية.'],
        en: ['CSS (Cascading Style Sheets) is the language that styles your HTML. Create a style.css file and link it to your HTML with: <link rel="stylesheet" href="style.css">.','Selectors: h1 { color: blue; } — this turns all <h1> headings blue. You can select by tag, class or ID.','Classes: .my-class { background: red; } — use class="my-class" in your HTML to apply the style.','Essential properties: color (text color), background-color (background), font-size (size), margin (outer space), padding (inner space), border (outline).','The box model: margin = space outside the box, padding = space inside, border = outline.','Flexbox: display:flex + justify-content + align-items lets you arrange elements flexibly — this is THE modern method.']
      },
      method: { fr: 'Prenez une page HTML simple et appliquez-y 5 styles différents. Expérimentez avec chaque propriété, changez les valeurs, observez le résultat en direct dans votre navigateur avec les DevTools (F12).', ar: 'خذ صفحة HTML بسيطة وطبّق عليها 5 ستايلات مختلفة. جرب كل خاصية، غيّر القيم، شاهد النتيجة مباشرة في المتصفح باستخدام أدوات المطور (F12).', en: 'Take a simple HTML page and apply 5 different styles to it. Experiment with each property, change values, observe the result live in your browser using DevTools (F12).' },
      exercise: { fr: 'Stylisez votre page "À propos de moi": titre principal en bleu, fond de page gris clair, texte centré, image arrondie (border-radius: 50%), marges de 20px. Utilisez Flexbox pour centrer le contenu.', ar: 'صمّم صفحة "عني": العنوان الرئيسي أزرق، خلفية الصفحة رمادية، النص في المنتصف، صورة مدورة (border-radius: 50%)، هوامش 20px. استخدم Flexbox لتوسيط المحتوى.', en: 'Style your "About Me" page: main heading in blue, light gray page background, centered text, rounded image (border-radius: 50%), margins of 20px. Use Flexbox to center the content.' },
      tip: { fr: '💡 Utilisez les DevTools (F12) de votre navigateur pour expérimenter le CSS en direct. Vous pouvez modifier n\'importe quelle propriété et voir le changement instantanément — puis copier le code dans votre fichier.', ar: '💡 استخدم أدوات المطور (F12) في متصفحك لتجربة CSS مباشرة. تقدر تغيّر أي خاصية وتشوف التغيير فوراً — ثم انسخ الكود في ملفك.', en: '💡 Use your browser\'s DevTools (F12) to experiment with CSS live. You can modify any property and see the change instantly — then copy the code into your file.' }
    }]
  }]

  id: 'seo',

  title: { fr: 'SEO & Marketing Digital', ar: 'SEO والتسويق الرقمي', en: 'SEO & Digital Marketing' },
  subtitle: { fr: 'Référencement Naturel', ar: 'تحسين محركات البحث', en: 'Search Engine Optimization' },
  tagline: { fr: 'Faites apparaître les sites en première page de Google', ar: 'خلّي المواقع تظهر في الصفحة الأولى من Google', en: 'Make websites appear on Google\'s first page' },
  levels: [{
    name: { fr: 'Débutant', ar: 'مبتدئ', en: 'Beginner' },
    badge: '🌱',
    duration: { fr: 'Semaines 1–3', ar: 'الأسابيع 1–3', en: 'Weeks 1–3' },
    goal: { fr: 'Comprendre le SEO et les mots-clés', ar: 'تفهم SEO والكلمات المفتاحية', en: 'Understand SEO and keywords' },
    lessons: [{
      id: 's-b-1',
      title: { fr: 'Introduction au SEO - Comment Google fonctionne', ar: 'مقدمة في SEO - كيفاش تشتغل Google', en: 'Introduction to SEO - How Google works' },
      image: 'https://images.unsplash.com/photo-1432889821006-ca37c5ce1bfa?w=800&q=80',
      layout: 'top',
      steps: {
        fr: ['SEO = Search Engine Optimization. C\'est l\'ensemble des techniques qui permettent à un site web d\'apparaître en haut des résultats de recherche sur Google.','Google utilise plus de 200 facteurs pour classer les sites. Les 3 piliers du SEO: 1. SEO Technique (la structure du site), 2. Contenu (le texte), 3. Backlinks (les liens externes).','Les mots-clés sont ce que les gens tapent dans Google. Exemple: si vous vendez des chaussures, vos mots-clés sont "chaussures", "baskets", "chaussures pas chères".','Le SEO On-Page: tout ce que vous pouvez contrôler sur votre site. Les balises title (le titre dans les résultats Google), meta description (le texte sous le lien), les H1 (titres), et les URL.','Le SEO Off-Page: ce qui se passe en dehors de votre site. Les backlinks (liens d\'autres sites vers le vôtre) sont le facteur le plus important.','Objectif SEO: comprendre ce que recherchent vos clients potentiels et créer du contenu qui répond à leurs questions.'],
        ar: ['SEO = تحسين محركات البحث. هو مجموعة التقنيات اللي تخلّي الموقع يظهر في أعلى نتائج البحث على Google.','Google يستخدم أكثر من 200 عامل لترتيب المواقع. 3 ركائز SEO: 1. التقني (هيكل الموقع)، 2. المحتوى (النص)، 3. الروابط الخلفية (الروابط الخارجية).','الكلمات المفتاحية هي اللي يكتبها الناس في Google. مثال: إذا تبيع شوز، كلماتك هي "شوز"، "باسكيت"، "شوز رخيص".','SEO On-Page: كل شيء تقدر تتحكم فيه على موقعك. علامات title (العنوان في نتائج Google)، meta description (النص تحت الرابط)، H1 (العناوين)، والـ URL.','SEO Off-Page: اللي يخرج خارج موقعك. الروابط الخلفية (روابط من مواقع أخرى لموقعك) هي العامل الأهم.','هدف SEO: تفهم شنو يبحث عنه زبائنك المحتملين وتصنع محتوى يجاوب على أسئلتهم.'],
        en: ['SEO = Search Engine Optimization. It\'s the set of techniques that help a website appear at the top of Google search results.','Google uses over 200 factors to rank sites. The 3 pillars of SEO: 1. Technical SEO (site structure), 2. Content (text), 3. Backlinks (external links).','Keywords are what people type into Google. Example: if you sell shoes, your keywords are "shoes", "sneakers", "cheap shoes".','On-Page SEO: everything you can control on your site. Title tags (the title in Google results), meta description (the text under the link), H1s (headings), and URLs.','Off-Page SEO: what happens outside your site. Backlinks (links from other sites to yours) are the most important factor.','SEO goal: understand what your potential clients are searching for and create content that answers their questions.']

// ===== APPLICATION LOGIC =====
var lang = localStorage.getItem('lang') || 'fr';
var hasAccess = localStorage.getItem('hasAccess') === 'true';
var skillId = null, levelIdx = 0, lessonIdx = null, openStep = null;

function showView(id) {
  ['landing','academy','skill-view','lesson-view'].forEach(function(v) {
    document.getElementById(v).style.display = 'none';
  });
  document.getElementById(id).style.display = 'flex';
  window.scrollTo(0, 0);
}

function setLang(l) {
  lang = l;
  localStorage.setItem('lang', l);
  document.documentElement.lang = l;
  document.documentElement.dir = l === 'ar' ? 'rtl' : 'ltr';
  document.querySelectorAll('.lang-btn').forEach(function(b) {
    var txt = b.textContent.trim();
    b.classList.toggle('active', (l === 'fr' && txt === 'FR') || (l === 'ar' && txt === 'ع') || (l === 'en' && txt === 'EN'));
  });
  if (hasAccess) {
    if (lessonIdx !== null) renderLesson();
    else if (skillId) renderSkill();
    else renderAcademy();
  } else {
    renderLanding();
  }
}

function checkAccess() {
  var t = T[lang];
  var val = document.getElementById('access-input').value.trim().toUpperCase();
  var err = document.getElementById('access-error');
  var btn = document.getElementById('access-btn');
  if (!val) { err.textContent = t.errEmpty; err.style.display = 'block'; return; }
  if (!CODES.includes(val)) { err.textContent = t.errInvalid; err.style.display = 'block'; return; }
  var used = JSON.parse(localStorage.getItem('usedCodes') || '[]');
  if (used.includes(val)) { err.textContent = t.errUsed; err.style.display = 'block'; return; }
  btn.textContent = t.loading;
  btn.disabled = true;
  setTimeout(function() {
    used.push(val);
    localStorage.setItem('usedCodes', JSON.stringify(used));
    localStorage.setItem('hasAccess', 'true');
    hasAccess = true;
    renderAcademy();
  }, 900);
}

function clearErr() {
  document.getElementById('access-error').style.display = 'none';
  document.getElementById('access-input').classList.remove('err');
  var btn = document.getElementById('access-btn');
  btn.textContent = T[lang].access;
  btn.disabled = false;
}

  document.getElementById('l-f3').textContent = t.f3;

    return '<div class="include-item"><span class="include-check">✓</span><span class="include-text">' + i + '</span></div>';
  }).join('');

  skillId = null; levelIdx = 0; lessonIdx = null;

function goSkill(id) { skillId = id; levelIdx = 0; lessonIdx = null; renderSkill(); }
function goLevel(i) { levelIdx = i; lessonIdx = null; renderSkill(); }

function getLevelStyle(name) {
  var map = { 'Débutant':'Beginner', 'مبتدئ':'Beginner', 'Beginner':'Beginner', 'Intermédiaire':'Intermediate', 'متوسط':'Intermediate', 'Intermediate':'Intermediate', 'Avancé':'Advanced', 'متقدم':'Advanced', 'Advanced':'Advanced', 'Maître':'Master', 'محترف':'Master', 'Master':'Master' };
  return LS[map[name] || name] || LS.Beginner;
}

function renderSkill() {
  var t = T[lang];
  var skill = SKILLS.find(function(s) { return s.id === skillId; });
  if (!skill) { console.error('Skill not found:', skillId); return; }
  var isAr = lang === 'ar';
  document.getElementById('skill-header').style.background = skill.bg;
  document.getElementById('skill-header').style.borderBottomColor = skill.color + '25';
  document.getElementById('sh-icon').textContent = skill.icon;
  document.getElementById('sh-title').textContent = skill.title[lang];

  }).join('');

  document.getElementById('level-info').innerHTML = '<div class="level-info-top"><span style="font-size:30px">' + lv.badge + '</span><div><div style="font-size:20px;font-weight:800;color:#fff">' + lv.name[lang] + '</div><div style="font-size:12px;color:#4B5563">' + lv.duration[lang] + '</div></div><div class="level-count" style="' + (isAr ? 'margin-right:auto' : 'margin-left:auto') + '"><div class="level-count-num" style="color:' + style.text + '">' + lv.lessons.length + '</div><div class="level-count-lbl">' + t.lessons + '</div></div></div><p style="color:#6B7280;font-size:13px;margin:0"><strong style="color:#9CA3AF">' + t.goal + ':</strong> ' + lv.goal[lang] + '</p>';
  document.getElementById('lesson-cards').innerHTML = lv.lessons.map(function(les, i) {
    return '<div class="lesson-card" onclick="goLesson(' + i + ')" onmouseenter="this.style.borderColor=\'' + skill.color + '66\'" onmouseleave="this.style.borderColor=\'#1C1C28\'"><span class="lesson-num" style="background:' + skill.color + '22;border:1px solid ' + skill.color + '44;color:' + skill.accent + '">' + (i + 1) + '</span><div class="lesson-info"><div class="lesson-title-text">' + les.title[lang] + '</div><div class="lesson-meta">' + les.steps[lang].length + ' étapes · exercice inclus</div></div><span style="color:#374151;font-size:20px;flex-shrink:0;transform:' + (isAr ? 'rotate(180deg)' : 'none') + '">→</span></div>';
  }).join('');
  var nav = '';
  if (levelIdx > 0) nav += '<button class="nav-prev" onclick="goLevel(' + (levelIdx - 1) + ')">' + (isAr ? '→' : '←') + ' ' + skill.levels[levelIdx - 1].name[lang] + '</button>';
  else nav += '<button class="nav-prev" onclick="renderAcademy()">' + (isAr ? '→' : '←') + ' ' + t.backSkills + '</button>';
  if (levelIdx < skill.levels.length - 1) nav += '<button class="nav-next" style="background:' + skill.color + '" onclick="goLevel(' + (levelIdx + 1) + ')">' + skill.levels[levelIdx + 1].name[lang] + ' ' + (isAr ? '←' : '→') + '</button>';
  document.getElementById('level-nav').innerHTML = nav;
  showView('skill-view');
}

function goLesson(i) { lessonIdx = i; openStep = null; renderLesson(); }
function prevLesson() { lessonIdx--; openStep = null; renderLesson(); }
function nextLesson() { lessonIdx++; openStep = null; renderLesson(); }
function nextLevel() { levelIdx++; lessonIdx = null; renderSkill(); }
function toggleStep(i) { openStep = openStep === i ? null : i; renderLesson(); }

function renderLesson() {
  var t = T[lang];
  var skill = SKILLS.find(function(s) { return s.id === skillId; });
  if (!skill) { console.error('Skill not found'); return; }
  var lv = skill.levels[levelIdx];
  if (!lv) { console.error('Level not found'); return; }
  var les = lv.lessons[lessonIdx];
  if (!les) { console.error('Lesson not found'); return; }
  var style = getLevelStyle(lv.name[lang]);
  var isAr = lang === 'ar';
  var isMobile = window.innerWidth < 600;
  var steps = les.steps[lang];
  var layout = les.layout || 'top';
  var showLeft = layout === 'left' && !isMobile;
  var showRight = layout === 'right' && !isMobile;
  document.getElementById('lesson-back-btn').textContent = (isAr ? '→' : '←') + ' ' + t.back.replace(/[←→]/g, '').trim();
  document.getElementById('lesson-back-btn').onclick = function() { renderSkill(); };
  document.getElementById('lesson-skill-icon').textContent = skill.icon;
  document.getElementById('lesson-skill-name').textContent = skill.title[lang];
  document.getElementById('lesson-level-name').textContent = lv.name[lang];
  document.getElementById('lesson-level-name').style.color = style.text;
  document.getElementById('lesson-counter').textContent = t.lesson + ' ' + (lessonIdx + 1) + ' ' + t.of + ' ' + lv.lessons.length;
  document.getElementById('lv-footer').textContent = t.footer;
  var imgTop = '', imgSide = '';
  if (les.image && (layout === 'top' || isMobile)) {
    imgTop = '<img class="lesson-img-top" src="' + les.image + '" alt="' + les.title[lang] + '" loading="lazy">';
  } else if (les.image && (showLeft || showRight)) {
    imgSide = '<div class="steps-side-img"><img src="' + les.image + '" alt="' + les.title[lang] + '" loading="lazy"></div>';
  }
  var stepsHTML = steps.map(function(step, i) {
    var isOpen = openStep === i;
    var preview = step.length > 80 && !isOpen ? step.substring(0, 80) + '…' : step;
    return '<div class="step-item" style="border-color:' + (isOpen ? skill.color + '60' : '#1C1C28') + '"><button class="step-btn" onclick="toggleStep(' + i + ')"><span class="step-num" style="' + (isOpen ? 'background:' + skill.color + ';color:#fff' : '') + '">' + (i + 1) + '</span><span class="step-text" style="color:' + (isOpen ? '#fff' : '#9CA3AF') + ';font-weight:' + (isOpen ? 600 : 400) + ';text-align:' + (isAr ? 'right' : 'left') + '">' + preview + '</span><span class="step-toggle">' + (isOpen ? '▲' : '▼') + '</span></button>' + (isOpen ? '<div class="step-expanded" style="display:block;padding:' + (isAr ? '0 52px 16px 16px' : '0 16px 16px 52px') + '">' + step + '</div>' : '') + '</div>';
  }).join('');
  var stepsWrap = '';
  if (showLeft) stepsWrap = '<div class="steps-with-img">' + imgSide + '<div class="steps-list">' + stepsHTML + '</div></div>';
  else if (showRight) stepsWrap = '<div class="steps-with-img" style="flex-direction:row-reverse">' + imgSide + '<div class="steps-list">' + stepsHTML + '</div></div>';
  else stepsWrap = '<div class="steps-list">' + stepsHTML + '</div>';
  var hasPrev = lessonIdx > 0;
  var hasNext = lessonIdx < lv.lessons.length - 1;
  var hasNextLv = levelIdx < skill.levels.length - 1;
  var prevBtn = hasPrev ? '<button class="lesson-nav-prev" onclick="prevLesson()">' + (isAr ? '→' : '←') + ' ' + t.prevLesson.replace(/[←→]/g, '').trim() + '</button>' : '<button class="lesson-nav-prev" onclick="renderSkill()">' + (isAr ? '→' : '←') + ' ' + t.back.replace(/[←→]/g, '').trim() + '</button>';
  var nextBtn = hasNext ? '<button class="lesson-nav-next" style="background:' + skill.color + '" onclick="nextLesson()">' + t.nextLesson.replace(/[←→]/g, '').trim() + ' ' + (isAr ? '←' : '→') + '</button>' : hasNextLv ? '<button class="lesson-nav-next" style="background:' + skill.color + '" onclick="nextLevel()">' + t.nextLevel + ': ' + skill.levels[levelIdx + 1].name[lang] + ' ' + (isAr ? '←' : '→') + '</button>' : '<div class="lesson-complete" style="color:' + skill.accent + ';border-color:' + skill.color + '50">' + t.complete + '</div>';
  document.getElementById('lesson-body').innerHTML = '<div style="margin-bottom:20px"><span style="background:' + style.bg + ';border:1px solid ' + style.border + ';color:' + style.text + ';border-radius:8px;padding:4px 12px;font-size:12px;font-weight:600">' + style.badge + ' ' + lv.name[lang] + '</span><span style="font-size:12px;color:#374151;margin-left:8px">' + t.lesson + ' ' + (lessonIdx + 1) + '</span></div><h1 style="font-size:clamp(20px,4vw,28px);font-weight:800;color:#fff;margin:0 0 24px;line-height:1.25">' + les.title[lang] + '</h1>' + imgTop + '<div style="margin-bottom:28px"><div class="steps-header"><div class="steps-bar" style="background:' + skill.color + '"></div><span class="steps-label">' + t.howTo + '</span></div>' + stepsWrap + '</div><div class="method-box" style="background:#0A0E18;border-color:' + skill.color + '30"><div class="box-header"><span class="box-emoji">🧠</span><span class="box-label" style="color:' + skill.accent + '">' + t.bestWay + '</span></div><p class="box-text" style="color:#9CA3AF">' + les.method[lang] + '</p></div><div class="method-box" style="background:#0E0A00;border-color:#92400E40"><div class="box-header"><span class="box-emoji">💪</span><span class="box-label" style="color:#FCD34D">' + t.exercise + '</span></div><p class="box-text" style="color:#D97706">' + les.exercise[lang] + '</p></div>' + (les.tip ? '<div class="tip-box"><p style="color:#6B7280;font-size:13px;line-height:1.65;margin:0">' + les.tip[lang] + '</p></div>' : '') + '<div class="lesson-nav">' + prevBtn + nextBtn + '</div>';
  showView('lesson-view');
}

// ===== INIT =====
(function() {
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.querySelectorAll('.lang-btn').forEach(function(b) {
    var txt = b.textContent.trim();
    b.classList.toggle('active', (lang === 'fr' && txt === 'FR') || (lang === 'ar' && txt === 'ع') || (lang === 'en' && txt === 'EN'));
  });
  if (hasAccess) renderAcademy();
  else renderLanding();
})();
</script>
</body>
</html>
